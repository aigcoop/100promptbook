            { id: 9, title: "수중 매크로 듀얼 패널", category: "인물/프로필", imageUrl: "images/9.jpg", content: "두 부분으로 나뉜 구성을 만드세요. 왼쪽 패널: 극사실적이고 매우 세밀한 클로즈업 업로드한 이미지속 피사체의 얼굴 왼쪽 부분만 물에 잠겨 있으며 눈은 프레임 왼쪽 가장자리에 선명하게 초점이 맞춰져 있습니다. 수중 매크로 시점으로 피부 모공, 젖은 속눈썹, 입술, 물방울과 기포 등 극도로 세밀한 디테일이 드러납니다. 황금빛 광선이 물을 뚫고 들어와 피부에 선명한 패턴을 만듭니다. 오른쪽 패널: 동일한 피사체를 약간 다른 각도에서 촬영했지만 얼굴은 그대로 유지하고, 더 깊이 잠수하고 기포 밀도를 높였습니다. 부드러운 그림자, 선명한 하이라이트, 그리고 젖은 질감을 강조하는 반사광이 어우러진 영화 같은 수중 조명을 사용했습니다. 두 패널 모두 수중 산란, 사실적인 질감, 얕은 심도, 영화적인 색감 보정, 그리고 몽환적이고 초현실적인 분위기를 특징으로 합니다. 극사실적이고 고해상도의 편집용 고품질 이미지를 구현하세요." },
            { id: 10, title: "새끼 고양이와 휴일 화보", category: "인물/프로필", imageUrl: "images/10.jpg", content: "아늑하고 몽환적인 하이패션 화보 같은 인물 사진입니다. 수십 마리의 다양한 품종의 폭신폭신한 새끼 고양이들이 마치 살아있는 구름처럼 프레임 전체를 가득 채우고 있습니다. 길고 촘촘하며 풍성한 털, 부드러운 질감, 풍성한 볼륨감, 그리고 각 새끼 고양이를 둘러싼 부드러운 후광까지. 브리티시 쇼트헤어, 스코티시 폴드, 메인쿤, 랙돌, 페르시안, 노르웨이 숲 고양이들이 섞여 있습니다. 모든 새끼 고양이들은 작고 깨끗하며 건강하고, 아기 같은 체형에 큰 눈망울과 동그란 얼굴을 하고 있으며, 흰색, 크림색, 베이지색, 회색, 은은한 적갈색 등 다양한 색상을 띠고 있고, 털의 디테일은 극도로 사실적입니다. 업로드된 이미지속 피사체는 마치 벽난로 옆에서 쉬는 듯 편안하게 중앙에 누워 눈을 살짝 감거나 잔잔하고 평화로운 미소를 짓고 있으며, 아늑하고 편안한 휴일 분위기를 자아냅니다. 따뜻한 붉은색의 새해 분위기가 물씬 풍기는 포근한 스웨터를 입고 있습니다. 오버사이즈 청키 니트, 부드러운 울 또는 캐시미어 소재, 두꺼운 원사, 풍부하고 진한 붉은색, 여유로운 핏, 우아하면서도 축제 분위기를 자아내는 휘게 감성, 로고 없는 디자인이 특징입니다. 따뜻한 벽난로 조명, 은은하게 빛나는 황색 불빛, 부드러운 그림자, 영화 같은 온기, 포근한 털의 하이라이트." },
            { id: 11, title: "레트로 90년대 로파이 아이돌", category: "인물/프로필", imageUrl: "images/11.jpg", content: "버전 14.1_retro_dynamic_fingerheart, 목표: 90년대 로파이 필름 인물 사진(패닝 모션 포함), 화면비 4:5, 렌더링 엔진: 아날로그 필름 시뮬레이션, 화질 등급: RAW 스캔/풍부한 텍스처, 특수 기법: 슬로우 셔터 패닝 + 플래시 프리즈, 피사체: 업로드한 사진속 인물의 20대의 모습, 귀엽고 어린 한국 K팝 아이돌, 유형: 순수/풋풋한 얼굴/청순한 매력 시선: 거울 속 자신의 모습과 달콤하게 눈을 마주치며, 표정: 부드럽고 따뜻한 미소, 볼 근처에서 작은 손가락 하트(엄지와 검지를 교차)를 만들고 있음, 메이크업: 가볍고 발랄한 \"과일 주스\" 메이크업 스타일(글래스 립), 헤어스타일: 부드럽고 어두운 웨이브에 귀여운 앞머리, 액세서리: 컬러풀한 레트로 헤어핀 또는 스크런치, 의상: 오버사이즈 빈티지 컬러풀 니트 가디건을 귀여운 그래픽 베이비 티셔츠 위에 걸침, 스타일: Y2K/90년대 아늑하고 레트로한 귀여움, 소품: 화려하고 약간 낡은 액자가 있는 커다란 빈티지 벽거울, 거울에 붙은 귀여운 스티커, 폴라로이드 사진, 손글씨 메모, 전경: 흐릿한 레트로 소품들(인형, 컬러풀한 소품)이 어수선한 십대 방을 암시 컵), 환경 아늑함, 어수선한 백스테이지 분장실 또는 침실, 분위기 향수 어린, 친밀한, 따뜻한, 어수선하면서도 귀여운, 조명 카메라 플래시(포인트 앤 슛 스타일), 그림자 강렬함, 피사체 뒤에 뚜렷한 플래시 그림자, 하이라이트 거울에 비치는 플래시 전구의 밝은 반사, 촬영 유형 반사된 모습을 담은 중형 인물 사진, 사진 작가는 보이지 않음, 렌즈 시뮬레이션 35mm 컴팩트 필름 카메라 렌즈, 모션 효과 배경과 가장자리에 상당한 수평 모션 블러(패닝 줄무늬), 플래시로 인해 피사체가 상대적으로 정지된 느낌, 필름 종류 후지 슈퍼리아 800 / 코닥 포트라 400(푸싱), 노이즈 심함, 눈에 띄는 필름 그레인 및 색상 노이즈, 색 보정 로우파이, 저가 필름 스캔에서 흔히 나타나는 따뜻한 녹색 색조, 생생한 빨간색과 노란색, 아티팩트 빛샘, 먼지 얼룩, 플래시 감쇠로 인한 비네팅" },
            { id: 12, title: "따뜻한 실내 생일 파티", category: "인물/프로필", imageUrl: "images/12.jpg", content: "따뜻한 실내 생일 파티를 담은 콜라주로,업로드한 이미지속 피사체가 다양한 순간을 포착했습니다. \n은은한 조명이 비추는 거실은 차분한 베이지 톤으로 꾸며져 있습니다. 벽에는 화려한 \"HAPPY BIRTHDAY\" 장식 배너가 걸려 파티 분위기를 더합니다. 한 장면에서는 소파에 다리를 꼬고 앉아 투명한 풍선과 일반 풍선을 들고 환하게 웃고 있습니다. 또 다른 장면에서는 화려한 풍선으로 커다란 아치를 만들어 머리 위로 들어 올리며 색종이 조각이 흩날리는 가운데 즐겁게 축하하고 있습니다. 마지막 장면에서는 소파에 앉아 나무 커피 테이블 위에 놓인 생일 케이크의 촛불을 끄면서 한 손에는 풍선을 들고 있습니다. \n핑크색 후드에 청바지, 편안하고 캐주얼한 복장, 자연스러운 표정, 사실적인 피부 톤, 따뜻한 조명, 축제 분위기이면서도 아늑한 집에서의 생일 파티 분위기, 라이프스타일 사진 스타일, 깔끔한 구도, 매우 사실적인 묘사, 1:1 화면비가 특징입니다." },
            { id: 13, title: "프리미엄 기술 광고", category: "광고/홍보", imageUrl: "images/13.jpg", content: "[장면] 설정: 스튜디오_영화 같은_광고 촬영. 환경: \n[배경] 부드러운 그라데이션의 영화 같은 배경. \n[조명] 고급스럽고 부드러우면서도 대비가 강한 조명. \n[분위기] 프리미엄_현대적인_기술_광고. \n[피사체] 업로드한 이미지속 사람. 외모: [얼굴] 매력적이고 대칭적이며 표정이 풍부함. [표정] 온화한_미소_매혹적인_시선. [렌더링 스타일] 초현실적인_클로즈업. 포즈: 카메라 가까이에 업로드 된 사진속 제품을 들고 있음. 초점: 얼굴과 제품에 선명함. [객체] 유형: 업로드된 사진속 제품. 표현 방식: 매크로_사실적. 재질: [플라스틱] 반짝이는_투명_고광택. [호일] 미세한 질감이 있는 은색 반사. 세부 정보: 업로드된 제품 형태 유지 \n[마감] 프리미엄 광택 고화질 디테일. [구도] 카메라: [각도] 매크로 초점을 사용한 클로즈업 인물 사진. [렌더링 스타일] 외관: 극사실적 영화적. 텍스처: 피부 디테일,  머리카락, 플라스틱 광택. 조명 효과: 피부에 아름다운 광채, 부드러운 반사광, 영화적 반사. [후처리] 색 보정: 프리미엄 필름 광고 등급. 대비: 높지만 균형 잡힌. 채도: 풍부하지만 세련된. 선명도: 최대. 화면비: 9:16" },
            { id: 14, title: "초현실적 스마트폰 상호작용", category: "광고/홍보", imageUrl: "images/14.jpg", content: "[메타] 유형: 크리에이티브 브리프. 장르: 극사실주의 초현실주의. 구도 스타일: 합성 인물 사진. 화면 비율: 세로형 ('인물 사진' 설명에서 암시됨). [장면 구성] 시점: [유형] 사진. [각도] 하이 앵글 / 내려다보는 시점. [프레임] 중앙 피사체에 초점을 맞춘 구도. 차원적 위계: [규칙] 초현실적인 효과를 위한 크기 차이. [주요 요소] 갤럭시 26 울트라 (초대형). [보조 요소] GCOOP 이라고 써있는 화이트북 (미니어처), 펜 (미니어처). [물리적 환경] 설명: 기기를 둘러싼 실제 환경. 환경: [표면] 나무 테이블. [질감 속성] 풍부한 나뭇결, 촉감, 마모된 느낌. 조명: [광원] 자연광. [색온도] 따뜻한 색. [그림자 질감] 부드럽고, 확산되고, 입체적인 느낌. 활동 요소: [정체성] 사람의 손 (실제). [동작] 붓기. [위치] 측면에서 프레임에 진입. 들고 있는 물체: [품목] 업로도된 피사체속 보라색 스틱제품. [상태] 차가움. [브랜드] 업로드된 이미지속 제품 유지 [내용물] 물질: 물. 색상: 진한 와인색. 상태: 액체 흐름. 정적 소품: [품목] 책. [색상] 하얀색. [크기 참고] 휴대폰보다 훨씬 작음. [품목] 펜. [종류] 볼펜/잉크펜. [크기 참고] 휴대폰보다 훨씬 작음. [디지털 영역] 설명: 화면에 표시된 내용. 컨테이너 장치: [모델] 갤럭시 26 울트라. [상태] 화면 켜짐. [방향] 물리적 표면에 평평하게 놓임. 화면 내용: [피사체 식별] mqn(참조 ID). [피사체 크기] 클로즈업(화면 가득). [표정] 행복한/미소짓는 업로드한 이미지속 인물. 와인잔을 들고있는 손 [복장] 밝은 보랏빛 후드티 계열 캐쥬얼룩 (참조와 일치). [배경] 봄에 벗꽃이 피어있는 풍경/벚꽃들이 있는 강변길 배경. [들고 있는 물체 디지털] 항목: 와인잔. 브랜드: [로고 텍스트] 디엘릭서 퍼플(고급스러운 필기체). [가시성] 투명. 초기 상태: 비어 있음(따르기 대기 중). [초현실적 연결 이벤트] 설명: 물리적 영역과 디지털 영역을 연결하는 상호 작용. 동작 유형: 차원 이동 유체 역학. 소스: realm_physical.held_object.contents (진한 와인색 물). 상호 작용 지점: realm_digital.container_device.screen_surface. 대상: realm_digital.screen_content.held_object_digital (유리잔). 물리 법칙 위반: [규칙 1] 액체가 유리 화면 표면에서 튀지 않음. [규칙 2] 화면 표면은 이 액체에 대해서만 투과성 막 역할을 함. [규칙 3] 물리적 액체가 접촉 시 디지털 표현으로 매끄럽게 전환됨. 시각적 세부 사항: 선명한 액체 시뮬레이션, 화면 유리에 표면 장력 없음, 액체가 물리적으로 디지털 와인잔을 채움. [렌더링 사양] 시각적 충실도: 극사실적. 질감 강조: 선명하고 유려한 디테일, 유리 표면의 픽셀, 나무결, 피부 질감(손과 피사체). 분위기: 영화적이고 따뜻하며 신비로운 느낌. 해상도 목표: 8K / 매우 높은 디테일." },
            { id: 15, title: "미니멀 제품 그림자 연출", category: "광고/홍보", imageUrl: "images/15.jpg", content: "최소한의 햇살이 비치는 벽. 업로드된 이미지 속 제품을 들고 있는 사람 손의 날카롭고 길쭉한 그림자. 그림자 속에 제품의 실루엣을 정확하게 재현하고, 병 모양, 뚜껑, 모서리, 비율까지 정밀하게 표현합니다. 업로드된 이미지에서 가져온 제품 라벨의 실제 텍스트를 깨끗하고 선명한 흰색 서체로 그림자 위에 투영하여 위치, 간격, 크기를 완벽하게 맞춥니다. 따뜻한 오후 햇살, 부드러운 나뭇결, 매끄러운 베이지색 벽 질감. 극도로 미니멀하면서도 고급스러운 스킨케어 분위기. 자연스러운 벽 색상 외에는 어떠한 추가적인 요소나 색상도 사용하지 않습니다. 예술적인 그림자 연출, 은은하고 몽환적인 분위기, 벽의 자연스러운 결점, 부드럽게 확산되는 빛." },
            { id: 16, title: "거대 알약 속의 풍경", category: "광고/홍보", imageUrl: "images/16.jpg", content: "거대한 세로형 알약을 들고 있는 사람의 손을 초근접 촬영한 장면입니다. 알약의 윗부분은 투명한 유리로 되어 있고, \n아랫부분 3/4은 밝은 빨간색 무광택 재질에 굵고 깔끔하며 완벽하게 정렬된 글씨로 \"디엘릭서 레드\"라고 쓰여 있습니다. 알약 안에는 첨부된 사진과 100% 동일한 얼굴의 사람이 있어야 합니다. 얼굴 구조, 비율, 표정의 기준선, 그 어떤 세부 사항도 변경해서는 안 됩니다.(다만 입고있는 옷은 레드색 캐쥬얼복장, 청바지) 얼굴은 자연스럽고 사실적인 활짝 웃는 표정이어야 합니다. 알약 안에서 사람은 벚꽃길을 산책하는 포즈를 취하고 있습니다. 장면 스타일: 재미있고, 혼란스럽고, 스릴 넘치고, 약간 섬뜩하면서도 강렬한 분위기. 배경: 화사한 벛꽃이 핀 강변길, 영화 같은 조명, 극적인 그림자, 풍부한 색감. 카메라 앵글: 손에 든 알약에 초점을 맞춘 항공 초근접 촬영. 텍스처: 미세한 입자, 선명한 미세 디테일, 유리 반사, 부드러운 무광택 재질 표현 등 초고화질의 사실적인 텍스처. 화면비: 3:4. 알약을 완벽하게 수직으로 유지하면서 알약 내부에 움직임, 에너지 및 역동적인 움직임을 확보하십시오." },
            { id: 17, title: "픽사 스타일 입학 안내", category: "애니메이션", imageUrl: "images/17.jpg", content: "픽사 애니메이션에서 영감을 받은 영화적인 스타일로, 자연스러운 이목구비, 헤어스타일, 피부톤은 그대로 유지하면서 극도로 사실적인 3D 디지털 일러스트레이션으로 표현된 업로드된 이미지속 인물의 모습입니다. 인물은 빛나는 오렌지색 직사각형 액자를 통해 따뜻한 미소를 지으며 살짝 기대어 있고, 두 손으로 액자 가장자리를 부드럽게 감싸고 있습니다. 오렌지색 직사각형 액자위쪽으로는 첫째줄에는' \"지쿱AI대학교에\" 둘째줄에는 \"'입학 하세요\" 라는 글씨가 빛나고 있습니다. 검은색 상의 위에 데님 재킷을 걸치고, 은은한 액세서리와 스마트워치를 착용하고 있습니다. 부드러우면서도 생동감 넘치는 조명은 얼굴의 깊이감, 사실적인 옷감 질감, 그리고 얼굴과 손에 비치는 따뜻한 빛을 강조합니다. 배경은 은은하게 흐릿하게 처리되어 사실감, 따뜻함, 그리고 픽사 특유의 매력이 완벽하게 조화를 이루는 영화적인 분위기를 연출합니다." },
            { id: 18, title: "미니어처 브랜드 상호작용", category: "광고/홍보", imageUrl: "images/18.jpg", content: "첨부된 이미지와 같이, 작은 인물들이 [브랜드 및 제품명] 제품과 사실적으로 상호작용하는 매우 정교한 미니어처 초현실적 장면을 제작하세요. 인물들은 마치 제품이 그들의 전부인 것처럼 행동하며, 모든 시각적 요소는 어떠한 선입견 없이 제품의 형태와 특징에 자연스럽게 어우러져야 합니다. 인물과 제품 간의 상호작용은 브랜드 이미지와 제품의 용도를 미묘하면서도 조화롭게 반영해야 하며, 깔끔한 시각적 구성과 미니멀한 배경을 활용해야 합니다. 영화적인 조명, 선명한 그림자, 그리고 날카로운 사진 기법을 사용하여 [브랜드명] 로고를 장면에 자연스럽게 통합하고, 제품의 맥락에 맞춰 자동으로 변화하는 짧은 슬로건을 함께 배치하세요. 요구 사항: 1:1 화면비 – 초정밀 디테일 – 사실적인 이미지 – 깔끔하고 전문적인 완성도." },
            { id: 19, title: "실험실 요리 디오라마", category: "광고/홍보", imageUrl: "images/19.jpg", content: "<지침>업로드된 제품 입력 A: 사진 또는 제품 이름. 입력 A: 사진 또는 제품의 전체 재료 목록, 주요 향미 화합물, 그리고 제조 과정에 관련된 주요 화학 반응(마이야르 반응, 캐러멜화, 유화, 변성)을 분석하세요. 선택 사항 입력 B: 스타일 참고 자료(무균 제약 실험실 / 무지 미니멀리즘). 없는 경우 ＂세련된 현대 화학 실험실과 고급 커피 테이블 정물화의 만남＂을 선택하세요. 목표: 실험실 벤치를 요리 시식대로 개조한 입체 디오라마를 제작하세요. 각 재료는 제조공정 및 화학 정보가 표시된 실험실 유리 용기에 담겨 있으며, 반응 경로를 보여주는 얇은 유리관으로 연결되어 있습니다. 규칙: 중성적인 배경, 무광택의 밝은 회색 또는 미색, 매우 부드러운 그림자. 중앙의 높은 단상에는 흰색 도자기 접시에 완벽하게 플레이팅 된 제품이 놓여 있습니다. 주변에 10~16개의 유리 기구(에를렌마이어 플라스크, 비커, 페트리 접시, 부피 플라스크, 시험관 등)를 배치합니다. 각 유리 기구에는 다음이 포함됩니다. 실제 재료 표본(원료 또는 가공된 재료, 원재료가 과일,채소일경우에는 과일,채소의 원물), 작은 라벨 스트립(굵은 글씨로 재료의 일반명, 작은 글씨로 학명/라틴어명, 주요 향미 분자명 + 작은 골격 구조 아이콘). 특정 용기들은 가는 유리관으로 연결하고, 작은 화살표 아이콘과 \"마이야르 반응\", \"유화 반응\", \"가수분해\"와 같은 작은 글씨로 주요 반응을 표시합니다. 라벨 스티커에는 미묘한 색상 코드를 사용합니다(큰 네모 상자는 사용하지 않음). 감칠맛(진한 빨간색 선), 단맛(연한 분홍색 선), 신맛(연한 노란색 선), 쓴맛(녹색 선), 지방(따뜻한 주황색 선), 향(라벤더색 선). 실험대 위에는 손으로 그린 ​​반응식과 만년필로 쓴 요리 노트가 있는 실험 노트 한 권을 펼쳐 놓습니다. 글꼴은 헬베티카 노이에와 같은 깔끔한 산세리프체, 가는 굵기, 라벨에 여백을 충분히 두는 것이 좋습니다. 유리 제품은 매우 투명하며, 사실적인 반사광, 액체 표면의 메니스커스, 그리고 미세한 왜곡이 표현됩니다. 인물은 보이지 않고, 장갑을 낀 손만 배경 깊숙한 곳에 흐릿하게 처리됩니다(선택 사항). 출력: 이미지 1장, 4:5 화면비, 고급 제품/편집 사진 스타일, 등각 투영 또는 3/4 각도, 부드러운 스튜디오 조명, 극사실적인 재질" },
            { id: 20, title: "픽사 스타일 사진작가", category: "애니메이션", imageUrl: "images/20.jpg", content: "업로드된 이미지속 인물이 픽사-디즈니 스타일의 스타일리시한 3D 애니메이션 사진작가 캐릭터가 됩니다. 부드러운 영화적 조명이 특징입니다. 짧은 곱슬 갈색 머리에 크고 표현력 풍부한 눈, 동그란 안경을 쓴 젊은 인물이 차분하고 자신감 넘치는 표정으로 팔짱을 끼고 서 있습니다. 목에는 빈티지 아날로그 카메라가 걸려 있습니다. 소매를 걷어 올린 크림색 셔츠와 하이웨이스트 올리브 그린 바지를 입고 있습니다. 배경은 오래된 카메라, 필름, 벽에 걸린 사진, 나무 테이블, 따뜻한 느낌의 스탠드 조명으로 가득한 아늑한 빈티지 사진 스튜디오입니다. 레트로 감성, 향수를 불러일으키는 분위기, 따뜻한 색감, 얕은 심도, 매우 섬세한 질감, 부드러운 그림자, 정교한 3D 렌더링, 스튜디오급 화질, 영화적 구도, 4K 해상도, 세로 방향 촬영이 특징입니다." },
            { id: 21, title: "고급 상업 마케팅 그리드", category: "광고/홍보", imageUrl: "images/21.jpg", content: "업로드된 제품을 중심으로 3:4 비율의 3x3 그리드를 구성하여 고급 상업 마케팅 캠페인 이미지를 제작하세요. 각 프레임은 뚜렷한 시각적 콘셉트를 제시해야 하며, 9개의 이미지 전체에 걸쳐 제품의 일관성을 완벽하게 유지해야 합니다. 그리드 컨셉(셀당 하나씩): 1. 대담한 구성을 가진 상징적인 히어로 정물화 2. 소재, 표면 또는 질감을 강조하는 극단적인 매크로 디테일 3. 제품을 둘러싼 역동적인 액체 또는 입자 상호작용 4. 추상적인 형태를 가진 최소한의 조형적 배치 5. 가벼움과 혁신을 암시하는 부유하는 요소 구성 6. 촉각과 사실감을 강조하는 감각적인 클로즈업 7. 제품 팔레트에서 영감을 받은 색상 중심의 컨셉 장면 8. 재료 또는 구성 요소의 추상화(비문자적, 상징적) 9. 사실주의와 상상력을 결합한 초현실적이면서도 우아한 융합 장면 시각적 규칙: 제품은 모양, 비율, 라벨, 타이포그래피, 색상 및 브랜딩 면에서 100% 정확해야 함. 제품의 왜곡, 변형 또는 재디자인 금지. 제품과 배경의 명확한 분리. 조명 및 스타일: 부드럽고 제어된 스튜디오 조명. 은은한 하이라이트, 사실적인 그림자. 높은 동적 범위, 매우 선명한 초점. 고급 광고 편집 미학. 프리미엄 감각 마케팅 룩. 전체적인 느낌: 현대적이고 세련되며 시각적으로 일관성 있는 고급 상업 캠페인. 브랜드 웹사이트, 소셜 미디어 등에 맞게 디자인됨. 디지털 광고판은 극사실적이고, 영화 같으며, 세련되고, 열망을 불러일으킵니다." },
            { id: 22, title: "캡슐형 3D 제품 렌더링", category: "광고/홍보", imageUrl: "images/22.jpg", content: "대형 캡슐형 용기의 극사실적인 3D 렌더링을 제작합니다. 윗부분은 브랜드의 시그니처 컬러로 마감된 광택 있는 표면이며, [브랜드] 공식 로고가 눈에 띄게 새겨져 있습니다. 아랫부분은 투명하여 브랜드의 유명 제품인 [제품]의 미니어처들이 깔끔하게 포장되어 있는 모습을 보여줍니다. 어두운 배경에 영화 같은 조명과 부드러운 반사 효과를 더해 고급스럽고 몽환적인 광고 분위기를 연출합니다. 매우 세밀하고 전문적인 제품 렌더링 스타일을 적용합니다. 해상도는 1080x1080입니다." },
            { id: 23, title: "강렬한 결단력 초상화", category: "인물/프로필", imageUrl: "images/23.jpg", content: "첨부한 인물의 드라마틱한 디지털 페인팅 스타일 초상화를 만들어주세요. 안경 없이 위를 바라보며 강하고 결단력 있는 표정을 짓고 있는 참조 이미지를 사용하세요. 작품은 대담하고 질감이 느껴지며, 에너제틱한 붓터치와 검정, 흰색, 빨강, 노랑의 제한된 색상 팔레트를 사용해야 합니다. 배경은 수직으로 나뉘어 추상적인 빨강과 노랑의 페인트 스트라이프가 있어 강렬하고 힘찬 분위기를 줍니다. 플레이어의 시선에서 야망과 자신감에 집중하고, 텍스트, 슬로건, 로고가 전혀 없는 깔끔한 디자인을 유지하세요. 구성은 동기부여가 되고 포스터 준비가 되어 있으며, 높은 디테일과 8K 해상도, 이미지 비율 4:5로 느껴져야 합니다." },
            { id: 24, title: "발렌타인데이 서프라이즈", category: "인물/프로필", imageUrl: "images/24.jpg", content: "첨부한 이미지의 캐릭터를 바탕으로, 단순하면서도 정교한 발렌타인데이 배경이 어우러진 재미있고 초현실적인 장면을 생성해 주세요. \n\n캐릭터는 \"발렌타인데이 서프라이즈(Valentine's Day Surprise)\"라고 적힌 커다랗고 열려 있는 선물 상자 안에 앉아 있습니다. 상자는 연분홍색을 주로 사용하고 빨간색과 흰색으로 포인트를 주어, 발렌타인데이 선물 포장에서 영감을 받은 고급스러운 느낌을 줍니다. 캐릭터가 남자일 경우, 러블리한 실크 턱시도를, 여자일 경우는 흰색 실크 드레스을 입고 있으며, 행복하면서도 놀란 표정을 짓고 있습니다. \n\n상자 주변에는 \"반품 및 교환 불가\", \"보증 없음\", \"한정판\"이라고 적힌 귀여운 안내 카드들이 흩어져 있습니다. 스타일은 명확한 그림자와 선명한 색감, 달콤한 발렌타인데이 분위기, 현대적인 제품 사진 미학, 그리고 영화 같은 연출이 가미된 실사 인물 사진 스타일입니다." },
            { id: 25, title: "보라색 새틴 에디토리얼", category: "광고/홍보", imageUrl: "images/25.jpg", content: "여성: 보라색 새틴 드레스를 입고 다이아몬드 보석으로 장식된 화려한 여성이 [우아한] 자세로 [우아한] 자세를 취한 전신 하이퍼리얼리틱 스튜디오 초상화로, 매끄러운 [보라색] 바닥 위에 [가로로 누워] 놓인 큰 [제품] 위에 우아하게 앉아 있는 모습. 그 물체는 과장되고 사실적으로 보이며, 피사체와 완벽하게 통합되어 있어 떠 있는 것이 아니다. 표면은 정확한 질감, 반사, 재료 깊이를 보여줍니다. 자세는 피사체의 태도와 대상과의 상호작용을 정의합니다 — 자연스럽고, 스타일리시하며, 표현력이 풍부합니다. 캐릭터는 균형 잡히고 자신감 넘치며, 물건의 분위기와 스타일과 잘 어울립니다. 배경은 매끄럽고, 벽과 바닥 색상은 같으며, 아래쪽은 약간 밝고 부드러운 반사가 있습니다. 조명: 깔끔한 전문 스튜디오 세팅 — 앞에서 왼쪽에서 디퓨즈드 키, 오른쪽에서 약간의 보완, 분리를 위한 은은한 테두리, 고르게 균형 잡힌 노출. 무드: 최소한의 구도와 사진처럼 사실적인 영화 같은 사치스러운 에디토리얼.\"" },
            { id: 26, title: "ELIXIR 홍보 포스터", category: "광고/홍보", imageUrl: "images/26.jpg", content: "원본 이미지의 레이아웃과 스타일을 그대로 유지한 '디엘릭서(ELIXIR)' 홍보 포스터. 상단에는 \"anytime\" 문구 아래에 세련된 필기체로 \"daily\", 그리고 그 아래 외곽선 처리된 굵은 글씨로 \"ELIXIR\"라고 적혀 있다. 중앙의 아치형 창 안에는 코르크 받침 위에 얼음과 연한 와인색 액체가 삼분의 일이이 담긴 유리잔이 있고, 한 손이 업로드 된 이미지속 스틱파우치에서 연한 와인색 분말을 잔에 샤르르 붓고 있다. 포스터 하단에는 원본 브랜드 로고 대신 \"D'ELIXIR\" 로고가 정중앙에 배치되어 있다. 전체적으로 따뜻한 베이지 톤과 골드 프레임의 액자 형태이다." },
            { id: 27, title: "디즈니-픽사 스타일 3D", category: "애니메이션", imageUrl: "images/27.jpg", content: "\"디즈니-픽사 스타일의 3D, 업로드된 참조 이미지에 캐릭터가 첨부되어 (참조 이미지에서 인물 얼굴을 100% 정확하게 유지함), 형광 녹색 안경을 쓰고, 집중하면서도 미소 짓는 업로드한 피사체, 큰 네온 그린 니트 스웨터를 입은 머리, 흰색 바지, 배경의 회색 콘크리트 배경, 따뜻한 영화 조명, 고해상도, 8K 해상도, 텍스트와 숫자 없음. 이미지는 광택 있는 반투명 바디에 미묘한 빛의 하이라이트가 있는 고디테일로 제작되었으며, 이는 무대의 따뜻한 영화적 조명, 정면, 초상화와 일치한다\"" },
            { id: 28, title: "럭셔리 퍼플 에디토리얼", category: "광고/홍보", imageUrl: "images/28.jpg", content: "여성: 보라색 새틴 드레스를 입고 다이아몬드 보석으로 장식된 화려한 여성이 [우아한] 자세로 [우아한] 자세를 취한 전신 하이퍼리얼리틱 스튜디오 초상화로, 매끄러운 [보라색] 바닥 위에 [가로로 누워] 놓인 큰 [제품] 위에 우아하게 앉아 있는 모습. 그 물체는 과장되고 사실적으로 보이며, 피사체와 완벽하게 통합되어 있어 떠 있는 것이 아니다. 표면은 정확한 질감, 반사, 재료 깊이를 보여줍니다. 자세는 피사체의 태도와 대상과의 상호작용을 정의합니다 — 자연스럽고, 스타일리시하며, 표현력이 풍부합니다. 캐릭터는 균형 잡히고 자신감 넘치며, 물건의 분위기와 스타일과 잘 어울립니다. 배경은 매끄럽고, 벽과 바닥 색상은 같으며, 아래쪽은 약간 밝고 부드러운 반사가 있습니다. 조명: 깔끔한 전문 스튜디오 세팅 — 앞에서 왼쪽에서 디퓨즈드 키, 오른쪽에서 약간의 보완, 분리를 위한 은은한 테두리, 고르게 균형 잡힌 노출. 무드: 최소한의 구도와 사진처럼 사실적인 영화 같은 사치스러운 에디토리얼.\"" },
            { id: 29, title: "사이버펑크 네온 후드", category: "인물/프로필", imageUrl: "images/29.jpg", content: "업로드된 사진속 인물만을 이용한 극도로 사실적인 시네마틱 스튜디오 인물 사진. 피사체는 밝게 빛나는 네온 오렌지색 회로선으로 완전히 덮여 있고 지퍼가 발광하는 검은색 사이버펑크 후드티를 입고 있으며, 후드를 쓰고 주머니에 손을 넣은 채 오른쪽을 향해 쿼터 포즈를 취하고 고개를 살짝 숙이고 있다. 빛나는 오렌지색 막대가 있는 둥근 셔터 안경을 착용했다. 드라마틱한 스튜디오 조명, 빛이 번지는 글로우 효과. 부드러운 어두운색에서 번트 오렌지색으로 이어지는 그라데이션 배경. 스타일 고정." },
            { id: 30, title: "이중 노출 시네마틱 프로필", category: "인물/프로필", imageUrl: "images/30.jpg", content: "업로드된 사진을 참고하여 (엄격한 동일성 유지, 얼굴은 첨부된 참고 사진과 정확히 일치해야 하며, 얼굴 구조, 피부 톤, 표정, 헤어스타일(동일한 헤어컷 및 머릿결)을 보존하여) 깨끗한 왼쪽 측면 프로필의 초현실적인 시네마틱 이중 노출 인물 사진을 만드세요. 날카로운 턱선과 자연스러운 얼굴 구조가 명확하게 드러나야 합니다.\n외부 실루엣은 부드러운 따뜻한 베이지색 일몰 배경에 대비되어 어둡고 윤곽이 잘 잡혀 있습니다. 실루엣 내부에는 골든 아워의 극적인 도시 거리 풍경을 매끄럽게 블렌딩합니다. 텅 비고 파괴된 도시 도로 중앙을 홀로 걸어가는 나의 모습, 대칭적인 원근법 선, 양쪽에 손상된 건물, 보도에 흩어진 부서진 잔해, 멀리 뻗어 있는 전봇대와 전선이 보입니다.\n태양은 걸어가는 인물 뒤 지평선에 직접 위치하여 강한 역광 빛과 카메라를 향해 길게 뻗은 그림자를 만듭니다.\n내부 도시 풍경을 가득 채우는 따뜻한 주황색 햇빛, 높은 대비, 시네마틱 깊이, 사실적인 질감, 인물과 환경 사이의 부드러운 블렌딩 가장자리.\n우울하면서도 희망적인 분위기, 8K 해상도, 선명한 디테일, 부드러운 비네팅. 4:5 비율 이미지 생성." },
            { id: 31, title: "로우키 림 라이트 초상화", category: "인물/프로필", imageUrl: "images/31.jpg", content: "완전히 검은 배경에 얼굴 윤곽을 따라 단 하나의 림 라이트만 비추는 업로드 된 사진속 피사체 의 로우키 옆모습 초상화를 생성해 주세요. 신비롭고 강렬한 분위기여야 합니다." },
            { id: 32, title: "고급 스튜디오 전시 포스터", category: "인물/프로필", imageUrl: "images/32.jpg", content: "업로드된 사진을 메인 피사체로 활용한 고급 스튜디오 인물 사진. \n인물이 부드러운 뉴트럴 톤의 깔끔하고 미니멀한 배경 앞에 서서 미소 짓고 있으며, 전시장에 전시된 느낌의 커다란 가로로 된 포스터가 피사체를 중심으로 피사체를 3분의 1정도를 겹치며  벽에 전시 되어 있다. \n\n포스터에는 업로드된 동일한 사진을 디지털 일러스트레이션, 스케치 또는 회화적인 예술 작품으로 예술적으로 재해석한 이미지가 담겨 있으며, 동일 인물임을 명확하게 알아볼 수 있다.  \n\n부드러운 키 라이트와 은은한 림 라이트가 있는 전문 스튜디오 조명이 부드러운 그림자와 깊이감을 연출한다. \n\n피사체의 표정은 차분하고 자신감 있으며, 자세는 편안하면서도 한쪽 손으로 턱을 살짝 받치고 다른 한 팔은 턱을 받치고 있는 팔꿈치에 걸치고 전문가가 분석하는 듯한 포즈를 취하고 강인하여 현대적인 개인 브랜드 아이덴티티를 연상시킨다. \n\n깔끔한 구성, 균형 잡힌 프레이밍, 프리미엄 에디토리얼 미학, 얕은 피사계 심도, 극도로 사실적인 피부 질감, 선명한 디테일, 현대적인 크리에이터 브랜딩 분위기, 시네마틱 리얼리즘, 1:1 종횡비, 고해상도." },
            { id: 33, title: "미니어처와 영화적 초상화", category: "애니메이션", imageUrl: "images/33.jpg", content: "아름다운 업로드된 사진속 여성이 작은 귀여운 3D 만화 소녀(사진속여성의 미니어처)를 작은 인형처럼 머리 묶음으로 잡고 미소 짓고 있는 영화 같은 초현실적인 초상화. 작은 캐릭터는 크고 표현력 있는 눈, 즐거운 미소, 벌린 팔을 가지고 있으며, 작고 세련된 드레스를 입고 있다. 업로드된 사진속 여성은 방금 제거한 것처럼 다른 손에 작은 머리핀을 부드럽게 들고 있다. 따뜻한 황금색 보케 배경, 부드러운 스튜디오 조명, 매우 섬세한 피부, 사실적인 손, 피사계 심도, 마법 같은 초현실적인 콘셉트, 3D 만화" },
            { id: 34, title: "현대적 UI 감정 그리드", category: "인물/프로필", imageUrl: "images/34.jpg", content: "패널은 가장자리까지 꽉 채워지지 않음\n패널 사이에 얇고 흰색 간격이 보임\n전체 그리드 주변에 미묘한 바깥쪽 흰색 여백이 있는 깔끔하고 현대적인 UI 스타일 레이아웃\n각 타일의 모서리가 약간 둥글게 처리됨\n업로드한 이미지가 피사체\n\n패널 1 — 즐거움 / 축하 (노란색) 밝은 노란색 그라데이션 배경 팔을 들어 올림 눈을 감음\n크게 웃음 에너지 넘치는 자세\n\n패널 2 — 충격 (파란색) 파란색 그라데이션 배경  뺨에 손을 얹음  눈을 크게 뜸  입을 벌림\n눈썹을 치켜 올림\n\n패널 3 — 진지함 / 엄격함 (빨간색)  빨간색 배경  팔짱을 낌  눈썹을 찌푸림  무표정한 굳게 다문 입술\n어두운 후드티 착용\n\n패널 4 — 다정함 (분홍색)  부드러운 분홍색 그라데이션  작은 갈색 강아지를 안고 있음\n부드러운 미소\n아늑한 니트 스웨터\n\n패널 5 — 자신감 / 당돌함 (보라색)  보라색 그라데이션 배경  한 손을 허리에 얹음\n살짝 비웃는 듯한 미소  그래픽 티셔츠  편안한 자세\n\n패널 6 — 친근함 / 가벼운 승인 (녹색)\n녹색 그라데이션 배경\n모자 + 데님 재킷 착용\n엄지손가락을 치켜 올림\n편안한 미소\n\n패널 7 — 슬픔 / 감성적 (회색)\n회색 그라데이션 배경\n살짝 아래를 응시함\n눈썹 중앙이 살짝 위로 올라감\n입술이 살짝 아래로 처짐" },
            { id: 35, title: "시네마틱 클로즈업 리얼리즘", category: "인물/프로필", imageUrl: "images/35.jpg", content: "초현실적인 시네마틱 클로즈업 인물 사진, 피사체를 내 참조 이미지로 대체.\n\n어깨 위로 보이는 업로드한 사진속 여성, 고개를 살짝 돌리고 부드럽고 사려 깊은 표정으로 프레임 밖을 응시. 자연스러운 얼굴 비율, 보이는 피부 질감, 미묘한 주근깨와 섬세한 디테일이 보존됨.\n\n느슨하고 살짝 흐트러진 머리카락이 얼굴에 드리워져 자연스럽고 친밀한 분위기를 연출하며, 얇은 끈의 검은색 상의를 착용, 최소한의 스타일링, 무거운 액세서리 없음. 조명은 극적이고 시네마틱함: 한쪽에서 얼굴에 비추는 따뜻한 지향성 빛, 반대편에는 깊은 그림자가 드리워져 강한 대비와 감성적인 깊이를 만듦. 배경은 어둡고 눈에 띄지 않으며 부드럽게 흐려져 얼굴에 완전히 집중.\n\n얕은 피사계 심도로 촬영, 85mm 인물 렌즈 느낌, 크리미한 보케, 높은 다이내믹 레인지, 따뜻한 하이라이트와 부드러운 그림자가 있는 자연스러운 색상 보정, 사실적인 피부 톤, 인위적인 광택 없음.\n\n사진처럼 사실적인, 초고화질, 에디토리얼 인물 사진, 시네마틱 리얼리즘, 필름 품질 조명, AI 아티팩트 없음." },
            { id: 36, title: "하이패션 마스킹 포스터", category: "광고/홍보", imageUrl: "images/36.jpg", content: "스타일 및 구성: 엄격한 1:2 세로 구도를 가진 하이패션 에디토리얼 타이포그래피 포스터.\n\n레이아웃 및 비율: 프레임은 오른쪽 3분의 2가 전체 피사체와 배경을 보여주고, 왼쪽 3분의 1은 타이포그래피 마스킹 섹션에 할당되도록 나누어져 있습니다.\n\n타이포그래피 마스킹: 왼쪽 3분의 1에 크고 굵고 세로인 \"AI GCOOP\"이 배치됩니다. 텍스트는 엄격히 풀블리드(full-bleed)로 되어 완벽하게 늘어나며, 프레임의 절대 상단과 하단 가장자리에 닿아 수직 패딩, 간격, 여백이 전혀 없습니다. 이 타이포그래피는 스텐실 마스크 역할을 하며, 글자는 밑에 있는 문자를 드러내고, 글자 왼쪽 끝 공간은 단단하고 깨끗한 흰색입니다.\n\n주제 상세 및 위치: [캐릭터 설명]의 상체 사진. 모델은 글자 사이로 왼쪽 끝만 보이고, 나머지 몸은 완전히 보이고 오른쪽 단색 [컬러] 배경 위에 배치되어 프레임 오른쪽 가장자리에서 피사체의 일부가 잘리지 않도록 합니다.\n\n포즈: [포즈 설명], 실루엣이 오른쪽 3분의 2 영역 중앙에 머무르도록 하세요.\n\n보조 텍스트: 오른쪽 상단에 \"[지쿱 AI 대학교에 입학하세요!]\"라는 텍스트를 추가하세요. 작고 세련된 흰색 \"Helvetica Condensed\" 스타일의 글꼴을 사용하고, 넓은 글자 간격(커닝)을 사용하여 프리미엄 미니멀한 느낌을 줍니다.\n\n색상 팔레트: 엄격한 단색 [COLOR] 인물사진은 컬러유디.  테마와 왼쪽의 선명한 흰색 네거티브 공간과 뚜렷한 대조를 이룹니다. 8K 해상도, 포토리얼리스틱한 텍스처, 선명한 스튜디오 조명, 높은 대비, 깔끔한 그래픽 디자인 미학.\"\n\n9:16 사이즈" },
            { id: 37, title: "AI 대학교 모집 포스터", category: "광고/홍보", imageUrl: "images/37.jpg", content: "대한민국 AI 교육 모집 포스터, 세련된 럭셔리 모던 디자인, deep black background + metallic gold + neon blue accents, no logos no branding whatsoever,\n\n상단 초대형 볼드 텍스트 (화이트 + subtle gold outline):\n지쿱 AI 대학교 [오산] 입학생 모집\n→ [지역명] 부분만 bright metallic gold 색상으로 강조\n\n그 아래 서브타이틀 (strong neon blue glow + slight silver outline으로 차별화):\nAI로 인세소득 부자되는 4주 실전형 커리큘럼\n\n정중앙에 첨부된 실제 강사 사진을 **정확히 그대로** 사용: \n동일한 얼굴 특징(눈, 코, 입, 얼굴형, 표정, 헤어스타일) 100% 유지, \n동일한 옷차림 그대로 (첨부 이미지의 모든 의상 디테일 – 색상, 스타일, 핏, 단추, 주름, 액세서리 등 변형 없이 완벽 복제), \n동일한 pose, posture, expression 그대로, \nsophisticated grooming과 luxury businessman vibe 유지, \nnatural studio lighting과 배경 톤을 reference 이미지와 정확히 매칭, \nhigh fidelity face reproduction, exact clothing replication including shirt color and style, no alterations to appearance, clothing, pose, expression, hairstyle or any detail whatsoever, photorealistic reference integration, do not change shirt to white or any other color\n\n강사 사진 바로 아래 골드 테두리 이름표 (white or gold text):\n대표강사 이은영\n\n(일반 텍스트 흰색)  AI 네트워크마케팅연구소 연구원   지쿱 AI 대학교 연구원\n\n하단에 두 줄 CTA 박스 (neon blue 또는 gold glow 효과):\n선착순 5명 무료교육\n신청방법 : 카톡 또는 DM\n\nelegant luxury tech poster, dramatic cinematic lighting, subtle futuristic glow, professional symmetric composition, clean typography, high contrast, prestigious feel, --ar 2:3 --stylize 250 --v 6 --cref [첨부 이미지] --cw 100" },
            { id: 38, title: "다양한 표정 스티커 팩", category: "애니메이션", imageUrl: "images/38.jpg", content: "\"A sticker pack sheet featuring a cute Korean woman's face with various facial expressions. The expressions include: angry, happy, shy, blowing a kiss, surprised, and sleepy. 2D digital art style, white borders around each sticker, Korean text captions below each head. Clean white background.\"\n핵심 키워드:\nSticker pack sheet: 스티커 팩 시트\nVarious facial expressions: 다양한 표정\nWhite borders: 스티커 느낌을 주는 흰색 테두리\nKorean text captions: 한글 자막  \n첨부된 실사 이미지로 스티커도 실사스타일로 생성해줘" },
            { id: 39, title: "실사 스타일 감정 스티커", category: "애니메이션", imageUrl: "images/39.jpg", content: "A sticker pack sheet featuring a cute Korean woman's face with various facial expressions. The expressions include: angry, happy, shy, blowing a kiss, surprised, and sleepy. 2D digital art style, white borders around each sticker, Korean text captions below each head. Clean white background.\"\n핵심 키워드:\nSticker pack sheet: 스티커 팩 시트\nVarious facial expressions: 다양한 표정\nWhite borders: 스티커 느낌을 주는 흰색 테두리\nKorean text captions: 한글 자막  첨부된 실사 이미지로 해줘" },
            { id: 40, title: "치비 미니어처 상호작용", category: "애니메이션", imageUrl: "images/40.jpg", content: "극사실적인 메인 주인공 주변에, 그와 동일한 이목구비, 헤어스타일, 신체 비율, 의상을 가진 귀여운 3D 스타일의 치비(Chibi) 미니어처 여러 명이 둘러싸고 있습니다. 이 치비 캐릭터들은 주인공 주변에 자연스럽게 배치되어 있으며, 주인공 또는 주변 요소들과 매력적이고 방해되지 않는 방식으로 장난스럽게 상호작용하고 있습니다. 이미지 위에는 생동감 넘치는 손그림 낙서(Doodle) 효과가 겹쳐져 있습니다: 주인공 주변의 부드러운 흰색 테두리, 반짝이는 효과, 하트 낙서, 작은 꽃, 스마일 아이콘, 그리고 \"shine\", \"bright night\", \"happy vibes\"와 같은 떠다니는 흰색 손글씨 문구들이 포함됩니다. 전체적인 스타일은 하이퍼 리얼리스틱 사진과 알록달록하고 부드러운 카툰 일러스트레이션이 자연스럽게 조화를 이룹니다. 단, 메인 주인공의 원래 얼굴, 체형 및 비율은 수정 없이 그대로 유지합니다." },
            { id: 41, title: "초현실적 스피드 스케이팅", category: "인물/프로필", imageUrl: "images/41.jpg", content: "{\n\n  \"project\": {\n\n    \"type\": \"초현실적인_스포츠_사진\",      \"goal\": \"실내_스피드_스케이팅_초상_전신_수직\",\n\n    \"aspect_ratio\": \"4:5\",        \"resolution\": \"1024x1280_이상\",\n\n    \"style\": \"사진처럼_실제적인, 높은_디테일, 전문_스포츠_편집\"\n\n  },\n\n  \"character_identity\": {\n\n    \"name\": \"이미지에서_참조된_인물\",       \"gender_presentation\": \"이미지에서_참조된_인물\",\n\n    \"body_type\": \"참조_이미지의_신체_유형_운동선수_핏_정의된_다리와_엉덩이\"\n\n  },\n\n  \"clothing\": {\n\n    \"category\": \"전문_한국_이미지에서_참조된_인물 성별_스피드_스케이팅_수트\",       \"fit\": \"피트한_공기역학적\",      \n  \"material\": \"기술적_라이크라_스판덱스\",       \"main_colors\": {\n\n      \"torso_front\": \"한국_국기_요소가_포함된_네이비_블루\",     \"arms\": \"빨강_흰색_파랑_패턴\", lower_body\": \"네이비_블로그 }  \n\n  },\n\n  \"pose_and_body_language\": {\n\n    \"stance\": \"훈련_사이_편안하게_서있음\",       \"body_orientation\": \"몸이_45도_뒤로_향함\",      \"upper_body\": \"카메라를_향해_약간_틀어짐\"\n\n  },\n\n  \"environment\": {\n\n    \"location_type\": \"실내_빙상_경기장\",     \"floor\": \"얼음_링크_표면\",       \"depth_of_field\": \"얕은_피사계심도\"\n\n  },\n\n  \"camera_settings\": {\n\n    \"lens\": \"85mm_f1_8\",       \"framing\": \"수직_전신_허벅지_중간_크롭_또는_전신\",        \"angle\": \"눈_레벨_조금_아래\"\n\n  },\n\n  \"quality_tags\": [\"초현실적인\", \"높은_디테일\", \"8k\", \"선명한_초점\", \"전문_스포츠_사진\"]\n\n}" },
            { id: 42, title: "3D 아기 피규어 버전", category: "애니메이션", imageUrl: "images/42.jpg", content: "[대상] 업로드된 사진 속 인물을 완벽하게 본뜬 초고화질 3D 아기 피규어 버전. 사진 속 인물의 헤어스타일, 이목구비의 특징, 그리고 입고 있는 의상의 색상과 디자인을 그대로 유지할 것. 통통한 볼살을 가진 귀여운 아기 비율이지만 피부와 옷감의 질감은 매우 사실적이어야 함.\n[구도 및 배경] 실제 사람의 커다란 손바닥 한가운데에 안정적으로 서 있는 모습. 9:16 세로 비율의 클로즈업 샷으로, 캐릭터의 상반신과 표정이 화면에 가득 차도록 배치. 배경은 따뜻한 느낌의 실내 스튜디오이며 부드럽게 보케(초점 흐림) 처리됨.\n[동작 및 표정] 캐릭터가 살아있는 것처럼 생생하게 움직임: 입술을 귀엽게 삐죽거리고, 눈을 깜빡이며, 고개를 양옆으로 살짝 갸우뚱함. 손을 꼼지락거리는 아주 작은 움직임을 포함하여 생동감을 극대화. 부드럽고 자연스러운 애니메이션.\n[광원 및 화질] 시네마틱 소프트박스 조명을 사용하여 캐릭터와 손바닥 위에 부드러운 입체감과 그림자를 형성. 8k 해상도, 영화 같은 3D 렌더링, 픽사(Pixar) 스타일의 고퀄리티 아트, 옷감의 보풀과 머리카락 한 올까지 표현되는 극사실적 디테일.\n💡 최고의 결과를 위한 팁\n이미지 업로드 필수: 이 프롬프트들은 반드시 사진을 먼저 업로드한 후, 그 사진에 대한 '설명'으로 입력해야 합니다. 그래야 AI가 \"uploaded image\"라는 문구를 인식하여 사진 속 얼굴을 아기 버전으로 변환합니다.\n비율 설정: 대부분의 툴은 버튼으로 비율을 정하지만, 명령어로만 작동하는 경우 프롬프트 끝에 --ar 9:16을 꼭 붙여주세요.\n일관성 유지: 만약 옷 색깔이 변한다면 영문 프롬프트의 specific outfit 뒤에 (grey jacket and navy pants) 처럼 구체적인 색상을 추가해 주면 더 정확해집니다" },
            { id: 43, title: "한복 수묵화 설날 카드", category: "광고/홍보", imageUrl: "images/43.jpg", content: "9:16 사이즈 카드뉴스\n\n---- 텍스트 ----\n\n(이미지 생성 프롬프트)\n\n우아한 수묵화 스타일,  한복입은 사람이 복주머니가 들고 있는 설날 카드를 만들어줘\n\n배경은 매화가 있고 색감은 은은하고 고급스러운 느낌\n\n한복입은 사람이 들고있는 복주머니와 매화나무는 3D 입체감있게 실사스타일과 수묵화스타일의 결합\n\n한복입은 사람은 업로드한 사진속 인물\n사진속 인물의 얼굴은 실제 이미지를 유지하도록 해줘\n\n해당 사진속 텍스트\n\"새해 복 많이 받으세요.\n풍요로운 한해 되시길 기원합니다\"\n이미지 사이즈는 9:16으로 만들어줘" },
            { id: 44, title: "미래지향적 AI 포스터", category: "광고/홍보", imageUrl: "images/44.jpg", content: "미래지향적인 AI 테마의 홍보 포스터. 깊은 보라색(Deep Purple)과 네이비 블루(Navy Blue) 색조가 어우러진 빛나는 디지털 3D 메쉬 그리드 배경. 연결된 점과 선, 시네마틱한 보케(bokeh) 파티클 효과가 포함됨. 하이테크하고 전문적이며 세련된 분위기. 강렬한 글로우 효과와 시네마틱 조명, 8k 초고해상도, 극도로 상세한 디테일.\n[텍스트 및 레이아웃 구성]\n우측 상단: 작은 흰색 글씨로 \"지쿱 AI 대학교\" 기재.\n상단 중앙: 크고 금속 질감이 느껴지는 보라색 그라데이션 3D 텍스트로 \"AI\" 배치.\n중앙 메인 타이틀: \"AI\" 바로 아래, 굵고 선명한 흰색 3D 텍스트로 \"기초부터 실전까지\" 기재.\n중앙 배너: 타이틀 아래에 빛나는 테두리를 가진 가로형 보라색 직사각형 배너를 두고, 그 안에 흰색 글씨로 \"24시간 잠들지 않는 AI 자동화 인세소득\" 삽입.\n모집 정보: 배너 아래 중앙에 흰색 글씨로 \"지쿱 AI 대학교 입학생 2기 모집\" 기재.\n일정: 그 아래에 \"2026.2.10.(화) ~ 2026. 2.28.(토)\" 날짜 표기.\n하단 슬로건: 맨 아래쪽에 작은 흰색 글씨로 \"평범한 당신을 AI 자산가로 만들어줍니다\" 태그라인 배치.\n[기술 규격]\n해상도: 8k resolution\n비율: 9:16 세로형 비율" },
            { id: 45, title: "명동 거리 화이트보드", category: "인물/프로필", imageUrl: "images/45.jpg", content: "사진속 사람이 캐쥬얼한 복장을 하고 화이트 보드를 들고 명동거리에 서 있다. 보드 안에는 \"안녕하세요. 지쿱 AI 대학교 입학하세요. !!!  여러분을 환영합니다\" 라는 문구가 적혀 있다. 이미지으로 만들어줘" },
            { id: 46, title: "럭셔리 텔로메라 화장품", category: "광고/홍보", imageUrl: "images/46.jpg", content: "샴페인 골드 빛의 밝은 스튜디오 배경, 우아한 드레스를 입은 업로드한 사진 모델, 업로드한 사진속 텔로메라 화장품을 보석처럼 들고 있는 포즈, 제품의 비례와 금속 질감 완벽 유지, 정교한 메이크업 디테일과 속눈썹 묘사, 소니 A7R V, 85mm f/1.2 렌즈, 럭셔리한 미학, 8k --ar 9:16" },
            { id: 47, title: "인플루언서 제품 리뷰", category: "광고/홍보", imageUrl: "images/47.jpg", content: "샴페인 골드 빛의 밝은 스튜디오 배경, 업로드한 사진속 사람이  전문 인플루언서처럼 포즈를 취하고 있다, 업로드한 사진속 제품을 한손에 보석처럼 들고 있고 한손에는 검은색 DJI Osmo 무선 마이크 송신기를 입 가까이에 대고 들고 있는 제품을 설명하는 포즈를 취하고 있다.  업로드한 사진속 제품의 컨셉과 어울리는 인플루언서에 맞는 의상을 입고 있다. 제품의 비례와 금속 질감 완벽 유지, 정교한 메이크업 디테일 묘사, 소니 A7R V, 85mm f/1.2 렌즈, 럭셔리한 미학, 8k --ar 9:16" },
            { id: 48, title: "The First Light Intro", category: "광고/홍보", imageUrl: "images/48.jpg", content: "[Subject & Action] A high-quality vertical portrait (9:16) of the woman from the uploaded image, maintaining her exact facial features and warm expression. She is gently holding the specific product from the uploaded reference with both hands, presenting it toward the camera with a soft, inviting smile.\n[Visual Strategy] The scene captures \"The First Light Intro\" concept. She is in a sun-drenched, minimalist minimalist vanity area. Soft morning golden hour light from a side window illuminates her face and the product, creating a bright, hopeful, and clean atmosphere.\n[Product Detail] The product must strictly match the shape, purple and rose gold color scheme, and label design of the bottle in the reference photo. Realistic reflections should appear on its metallic and plastic surfaces.\n[Technical Specs] Shot on Sony A7R V, 50mm lens, f/1.8, ISO 100. Hyper-realistic details: luminous skin texture, visible pores, individual hair strands, and natural hand/finger textures. High-key lighting, shallow depth of field with a beautifully blurred background. 8k resolution, cinematic quality, photorealistic." },
            { id: 49, title: "공중 부양 AI 버튼", category: "광고/홍보", imageUrl: "images/49.jpg", content: "9:16 사이즈\n스마트폰이 테이블에 놓여져있고 AI스럽게 스마트폰에서 빛이 밖으로 은은히 비춰서 나오면서 '지쿱 AI 대학교' 버튼이 입체화 되서 글씨가 공중에 떠있는 이미지를 생성해줘" },
            { id: 50, title: "두쫀쿠 시식 영상 프레임", category: "광고/홍보", imageUrl: "images/50.jpg", content: "A hyper-realistic vertical video based on the reference image.\n[Camera Control: ABSOLUTE STATIC LOCK]\n**TRIPOD SHOT. NO ZOOM. NO PANNING. NO MOVEMENT.**\nThe camera framing is IDENTICAL to the reference image. Every object, including the plate and the table, must remain in its original position.\n\n[Object Fidelity: CRITICAL]\n**THE COOKIE SHE PICKS UP MUST BE IDENTICAL TO THE 'DUJJONKU' ON THE PLATE IN THE REFERENCE IMAGE.** The cookie has a thick coating of dark cacao powder, a slightly irregular round shape, and a moist marshmallow-filled core with crispy kataifi. \n\n[Audio Constraints: CRITICAL]\n**ABSOLUTE SILENCE for background. NO MUSIC. NO AMBIENT NOISE.**\n**Generate ISOLATED KOREAN VOICE ONLY (starts after swallowing).**\n\n[Action Sequence: Consistent Interaction]\n1. [0-3s: Picking up]: The woman from the reference image reaches down to the plate shown in the photo. Her right hand picks up the EXACT SAME \"Dujjonku\" cookie from the plate. \n2. [4-8s: Savoring]: She takes a slow, deep bite. The visual shows the dark cacao powder on the surface and the sticky marshmallow stretching as she bites. She chews slowly and deliberately, looking deeply satisfied. \n3. [9-10s: The Swallow]: She performs a natural swallowing motion and licks the cacao powder from her lips with a smile.\n4. [11-16s: Clear Dialogue]: Holding the \"THE ELIXIR BROWN\" enzyme stick, she looks at the camera and speaks clearly.\n\n[Dialogue Delivery - KOREAN]\nThe person says the following lines ONLY AFTER the swallowing action is complete: \n\"아밀라아제, 프로테아제, 리파아제까지! 식전 1포로 탄·단·지 한 번에 싹~\"\n\n[Details]\nExtreme high fidelity to the reference image's props and subject. Realistic skin texture, fine cacao powder particles on lips and fingertips. Perfect Korean lip-sync. 4K resolution.\n\n--Negative Prompt: different cookie shape, generic cookie, hallucinated objects, speaking while chewing, food in mouth, background music, sound effects, noise, ambient sound, distorted face, morphing background, shaky camera, extra fingers, bad anatomy, plastic skin, blur.\n\n영상을 생성할 프롬프트야.  이 영상의 첫화면 사진을 업로드한 사진을 베이스로 생성해줘.  (영상은 생성하지 말고 첫화면 이미지만 생성해줘 ) 접시에 있는 두쫀쿠를 손에 들고 한입 베어물고 있는 사진" },
            { id: 51, title: "여배우급 비주얼과 효소 리뷰", category: "인물/프로필", imageUrl: "images/51.jpg", content: "9:16 비율의 세로형 인물 사진으로, 최고의 여배우급 비주얼과 백옥 같은 피부, 완벽한 메이크업을 자랑하는 젊은 한국 여성이 등장합니다. 풍만한 가슴(B컵 이상)과 넓은 골반을 가진 매혹적인 곡선미를 뽐내며, 아늑한 거실의 편안한 소파에 똑바로 앉아 작은 검은색 DJI Osmo 무선 마이크 송신기를 들고 카메라를 응시하며 앞에 놓은 두쫀쿠와 디엘릭서 효소에 대해서 이야기를 나누고 있습니다. 깊게 파인 U넥 라운지 탑을 입고 있어 볼륨감 있는 가슴 라인을 강조하며, 머리는 여성스러운 반묶음 스타일입니다. 소파 앞에 테이블에는 두바이쫀득쿠키(첫번째 업로드한 사진)가 놓은 접시와 그 옆에는  디엘릭서 브라운 효소(두번째 업로드한 사진) 제품이  놓여있다. 4K 화질에 사실적인 피부 질감이 표현되었습니다." },
            { id: 52, title: "럭셔리 레스토랑 라이프스타일", category: "광고/홍보", imageUrl: "images/52.jpg", content: "A vertical 9:16 lifestyle shot of a glamorous Korean woman in a high-end restaurant, sitting at a marble table. She is elegantly holding a 'THE ELIXIR BROWN' box and a single stick, preparing to take it before her meal. She is wearing a chic off-the-shoulder cream sweater. Warm afternoon sunlight streaming through the window, soft bokeh on the gourmet pasta in the background. Highly detailed fabric texture, realistic hair strands, cinematic mood, Hasselblad H6D, 35mm lens, vibrant yet soft colors. --ar 9:16  제품은 업로드한 사진속 제품 형태를 유지해서 만들어줘 " },
            { id: 53, title: "성분 전환 매크로 시네마", category: "광고/홍보", imageUrl: "images/53.jpg", content: "A seamless, high-end macro cinematography sequence depicting a gentle transformation. Fresh, vibrant crisp red apples, earthy orange carrots, and leafy green cabbage are artfully arranged, then elegantly transition and blend into a fine, uniform nutrient-rich powder. This powder then subtly compacts and forms into sleek, polished dietary supplement capsules. Emphasize the natural textures and colors of the raw ingredients before they coalesce. Soft, diffused overhead lighting illuminates the process, creating subtle highlights and shadows on a clean, light-colored studio background. 8k resolution, cinematic, hyper-detailed, organic, clean aesthetics. A graceful, slow-motion dissolve and morph effect between each stage, showcasing the purity of the transformation.\"" },
            { id: 54, title: "카리스마 테크 스피커", category: "인물/프로필", imageUrl: "images/54.jpg", content: "A photorealistic vertical photograph (9:16 aspect ratio) featuring the exact same person from the reference image, transformed into a charismatic Korean female tech speaker. \n\n[Subject & Anchor]: High fidelity to the subject's facial features, eyes, and skin tone from the reference image. Even if the reference image is only a portrait or upper-body shot, this image must be a FULL BODY SHOT showing the person from head to toe.\n\n[Attire & Pose]: She is wearing a perfectly tailored, slim-fit navy blue pantsuit that highlights a tall and slender frame, paired with matching trousers and elegant professional shoes. She stands with a commanding, authoritative posture on a professional conference stage. Her right hand holds a sleek black presentation clicker, and her left hand is raised in a confident, persuasive gesture.\n\n[Environment]: She is standing on a large, polished conference stage. Behind her is a massive, glowing LED screen displaying complex blue and white data graphs, charts, and the text \"AI FUTURE VISION\". In the blurred foreground, the silhouettes of a large audience are visible, looking up at her in a darkened auditorium.\n\n[Lighting & Quality]: Dramatic, high-contrast TED-talk style stage lighting, creating distinct catchlights in her eyes and highlighting the premium fabric texture of her suit. 4K resolution, raw photo style, extremely detailed skin texture, sharp focus on the speaker, cinematic color grading.\n\n--ar 9:16 --v 6.0 --stylize 250" },
            { id: 55, title: "지쿱 AI 대학교 입학설명회", category: "광고/홍보", imageUrl: "images/55.jpg", content: "A professional recruitment poster for \"GCOOP AI University\". Top center features bold, large 3D metallic text in white and gold saying \"지쿱 AI 대학교 입학 설명회\". Below it, smaller white text reads \"초보자도 가능한 AI 자동화 인세소득 시스템 구축 전격 공개\". In the middle, 첨부하는 이미지의 인물을 배치해주고 전문적으로 보이게 만들어줘. 샤넬정장슈트를 입혀주고, 전문성과 자신감이 드러나도록 해줘. Behind him, a high-tech futuristic background with glowing cyan and purple digital data streams and \"AI\" icons. At bottom, a clean semi-transparent box contains lecture details in yellow and white text: \"일시: 2026년 2월 3일 (화) 2시~4시\", \"장소: 지쿱 서울 가산 캠퍼스\", . High-quality graphic design, cinematic lighting, 8k resolution. 이미지 사이즈를 4:5 사이즈로 만들어줘" },
            { id: 56, title: "플러시 베드 제품 리뷰", category: "인물/프로필", imageUrl: "images/56.jpg", content: "A vertical portrait shot in 9:16 aspect ratio of a young Korean woman with **top-tier actress visuals, porcelain white skin, and flawless makeup.** She possesses a **glamorous, curvaceous figure with an ample bust (B-cup+) and wide hips.** She is sitting on a plush bed, **holding a small black DJI Osmo wireless microphone transmitter near her mouth**, looking directly at the camera explaining softly. She is wearing a **tight, ribbed knit midi dress that clings to every curve of her body.** Her long hair is styled in loose, tousled \"bedhead\" waves. Sunlit bedroom background. 4K photo, realistic skin texture.위에 생성된 사진속 여성이 마스크대신에 지금 업로드한 사진속 제품을 들고 있는 사진으로 생성해줘 " },
            { id: 57, title: "시네마틱 스튜디오 오프닝", category: "광고/홍보", imageUrl: "images/57.jpg", content: "A vertical 9:16 hyper-realistic portrait photograph serving as the opening frame of a video. A top-tier Korean actress-influencer with porcelain skin and a glamorous figure is seated comfortably on a cozy, plush sofa in a cinematic studio setting. She is holding both the 'GCOOP THE ELIXIR BROWN' gold box and a single stick clearly, presenting them towards the camera lens. Her expression is a bright, welcoming smile with direct eye contact, poised just before speaking. Soft, professional studio lighting highlights extremely detailed skin texture, visible pores, fine individual hairs, and the metallic sheen of the product packaging. Shallow depth of field with a softly blurred background. 8k resolution, highly detailed. --ar 9:16" },
            { id: 58, title: "베이지 소파 인플루언서", category: "인물/프로필", imageUrl: "images/58.jpg", content: "[Prompt] A vertical portrait shot in 9:16 aspect ratio of a young Korean woman with top-tier actress visuals, porcelain white skin, and flawless makeup. She possesses a glamorous, curvaceous figure with an ample bust (B-cup+) and wide hips. She is sitting relaxed on a plush beige sofa, holding a small black DJI Osmo wireless microphone transmitter, looking at the camera explaining softly. She is wearing a tight ribbed knit cardigan with a deep V-neck, unbuttoned at the top to reveal her cleavage and emphasize her bust. Her hair is styled in a loose, messy bun. 4K photo, realistic skin texture." },
            { id: 59, title: "아이덴티티 앵커 매크로", category: "인물/프로필", imageUrl: "images/59.jpg", content: "{\n  \"identity_anchor\": {\n    \"reference_image_priority\": \"absolute\",\n    \"global_proportion_lock\": {\n      \"instruction\": \"극단적 매크로 크롭 상황에서도 전체 기준 비율을 유지할 것\",\n      \"preserve_relative_scale_to_full_face\": true,\n      \"do_not_compact_or_isolate_shape\": true\n    },\n    \"feature_fidelity\": {\n      \"eye_shape_retention\": \"Maintain the specific monolid/near-monolid eye shape and the distinct curve of the upper eyelid from the reference image.\",\n      \"iris_and_sclera\": \"Dark brown iris with natural depth, keeping the specific ratio of visible sclera to the iris.\",\n      \"eyelash_characteristics\": \"Individual eyelash definition, including the specific curl and length as shown with mascara.\",\n      \"contextual_elements\": \"The edge of the red eyeglass frame must be visible at the peripheral edge of the crop to maintain spatial context.\"\n    },\n    \"forbidden_operations\": [\n      \"국소 형태 평균화\",\n      \"매크로로 인한 비율 압축\",\n      \"대칭 보정\",\n      \"미적 향상 또는 일반화\"\n    ]\n  },\n  \"camera_and_lens_settings\": {\n    \"lens\": \"100mm f/2.8 Macro lens\",\n    \"sensor\": \"Full-frame high-resolution sensor\",\n    \"shot_type\": \"Extreme Macro, Ultra-tight crop focusing on the right eye\",\n    \"depth_of_field\": \"Shallow, focusing sharply on the iris and lashes while the skin texture slightly softens at the periphery\"\n  },\n  \"lighting_and_atmosphere\": {\n    \"source\": \"Soft natural indoor light\",\n    \"quality\": \"Direct but diffused lighting that reveals genuine skin moisture and pore structure\",\n    \"reflections\": \"Subtle catchlight in the pupil, mirroring the ambient environment from the reference\"\n  },\n  \"biological_textures\": {\n    \"skin\": \"Hyper-realistic skin grain, fine dehydration lines, natural sebaceous shine on the lower eyelid and nose bridge.\",\n    \"ocular_surface\": \"Wet, reflective corneal surface with minute capillary details in the sclera.\",\n    \"makeup_detail\": \"Authentic texture of applied mascara, including slight clumping and fiber detail without smoothing.\"\n  },\n  \"exclusion_criteria\": {\n    \"technical_artifacts\": [\n      \"no CGI\",\n      \"no AI look\",\n      \"no smoothing\",\n      \"no retouching\",\n      \"no airbrushing\",\n      \"no sharpening artifacts\"\n    ],\n    \"stylization\": [\n      \"no makeup beyond reference\",\n      \"no stylization\",\n      \"no beautification\",\n      \"no symmetry correction\"\n    ]\n  }\n}" },
            { id: 60, title: "오래된 성당의 데코 창문", category: "배경/풍경", imageUrl: "images/60.jpg", content: "오래된 성당의 창문이 멋지게 보이는 사진 9:16  데코레이션창문이 멋지고 아름답게 보이는 이미지를 만들어줘" },
            { id: 61, title: "촉촉한 피부 리얼 후기", category: "인물/프로필", imageUrl: "images/61.jpg", content: "9: 16 사이즈로 세안을 하고 난뒤에 촉촉함이 유지되는 한국여성의 얼굴 클로즈업 사진을 생성해줘.  얼굴은 AI스럽게 최대한 실제에 가까운 사진형태로 생성해줘 . 비누 포스트용 사진에 들어갈 후기용 사진형태로 사용할거야. 텍스트는 없이 만들어줘 . 얼굴은 너무 거칠지 않고 매끈한 피부형태로 해줘 " },
            { id: 62, title: "와인 바다의 공포", category: "광고/홍보", imageUrl: "images/62.jpg", content: "시네마틱 9:16 세로 포트레이트. 고급 비즈니스 수트를 입은 한국인 남성(30대 중반, 전형적인 직장인 모습)이 절망과 공포에 질린 표정으로, 거대하고 요동치는 짙은 붉은색 와인 바다에 목까지 잠겨 허우적거리고 있다. 사방에서 거대한 와인 파도가 덮치고 있으며, 배경으로는 와인 홍수에 잠겨가는 서울의 현대적인 스카이라인(예: 남산타워가 살짝 보이는)이 보인다. 불길한 보랏빛과 붉은빛이 섞인 폭풍전야의 하늘. 하이퍼 리얼리즘 액체 물리 효과, 극적인 하이 콘트라스트 조명, 거대한 물보라. 8k 해상도, 무비 포스터 스타일.   텍스트(상단배치) : \"늙기 싫으시죠? 그럼 당장 와인 168만 리터 마셔야 합니다!\"\n💡 이미지 구성요소 설명\n피사체: 공포에 질린 표정의 한국인 직장인 남성 (공감대 형성)\n상황: 거대한 와인 바다에 목까지 잠긴 서울 도시 (압도적 스케일로 시선 강탈)\n색감: 어둡고 무거운 레드와 블랙, 그리고 불길한 보랏빛 하늘 (위기감 조성)" },
            { id: 63, title: "장수 유전자 DNA 에너지", category: "광고/홍보", imageUrl: "images/63.jpg", content: "매크로 9:16 세로 사진. 미니멀한 칠흑 같은 어둠 속에 떠 있는 \"THE ELIXIR PURPLE\"이라고 금박으로 새겨진 고급스러운 메탈릭 딥 퍼플 색상의 스틱 포장지의 극초근접 샷. 제품 스틱에서 밝고 강력한 일렉트릭 퍼플 에너지 줄기와 빛나는 입자들이 뿜어져 나오며, 배경에 은은하고 세련된 DNA 이중 나선 구조를 형성하고 있다. 포토리얼리즘, 매크로 사진, 옥테인 렌더, 부드럽고 마법 같은 조명. 우아하고 현대적이며 신비로운 분위기. 8k 해상도.   텍스트(상단배치) : \"아니면, 이 '퍼플' 한 포로 장수 유전자 깨울래요? 선택은 당신의 몫.\"" },
            { id: 64, title: "Prada 테일러드 골드 핀", category: "인물/프로필", imageUrl: "images/64.jpg", content: "프로필 사진 스타일 패션 에디토리얼 허리 위 상반신 초상, 정면 waist-up 샷 (허리선부터 머리까지), 전문 여성 모델, Prada inspired tailored black suit, sharp lapels, minimalist luxury, Prada 스타일 올 블랙 테일러드 수트 재킷 + 블랙 셔츠 (또는 블랙 터틀넥 셔츠), 구조적인 sharp lapels와 깔끔한 미니멀 테일러링, 재킷 라펠에 황금색 'AI' 모노그램 핀 (골드 메탈, 약 5cm 크기, 럭셔리 엘레강트 디자인) 착용, Hasselblad X2D 100C + XCD 90mm f/2.5 렌즈로 촬영, 시네마틱 세피아 컬러 그레이딩 + 골든아워 따뜻함, 번트 엄버에서 허니 앰버로 부드러운 그라데이션 배경에 드라마틱한 검은 실루엣 강조, 아방가르드 구성, 카메라를 강렬하고 깊게 직시하는 profound intense gaze, 우아하게 길게 뻗은 neck & shoulders, 60도 각도 메인 프레넬 조명 + 실크 디퓨전으로 얼굴과 상체를 부드럽게 감싸는 빛, 75도 각도 CTO 젤 림 라이트로 윤곽과 collarbone sharp lapels gold AI pin 강조, 헤이즈 머신으로 에테리얼 몽환적 분위기, feathered soft shadows, 강한 대비 커브 조정, selective dodge and burn on face eyes neck shoulders lapels gold pin shirt collar, 미세 grain texture overlay, 5500K→3200K 컬러 온도 그라데이션, ultra sharp hyper-realistic details especially eyes skin hair collarbone jacket texture gold AI pin black shirt, RAW format, Paolo Roversi 조명 기법 영감 — 꿈같은 부드러운 빛 페인팅과 깊은 감성, 16K rich detail, professional profile picture composition centered with direct eye contact waist-up framed tightly on upper body --ar 9:16 --ar 2:3 --quality 2 --style raw --stylize 400 --v 6.1" },
            { id: 65, title: "손바닥 위 표정 변화 그리드", category: "인물/프로필", imageUrl: "images/65.jpg", content: "표정 변화 그리드 (3번째 이미지) 프롬프트\n동일한 구도에서 표정만 바뀌는 여러 장의 사진을 얻고 싶을 때 사용합니다.\n영어 프롬프트:\n\"A 3x2 grid layout of a miniature woman in a human palm. Each frame shows a different facial expression: pouting, winking, smiling, making a heart, shrugging, and blowing a kiss. Consistent character, black tweed outfit, realistic photography style, soft depth of field.\"\n핵심 키워드:\n3x2 grid layout: 3행 2열 격자 구조\nConsistent character: 동일한 캐릭터 유지\nDifferent facial expressions: 각 프레임마다 다른 표정 9:16으로 해줘" },
            { id: 66, title: "3D 미니어처 필라테스 강사", category: "애니메이션", imageUrl: "images/66.jpg", content: "필라테스 강사 컨셉 (스튜디오 배경)\n\"사람 손바닥 위에 앉아있는 아주 귀여운 3D 애니메이션 스타일의 미니어처 여성 필라테스 강사. 머리가 큰 대두(bobblehead) 스타일. 깔끔한 레깅스와 요가복 상의를 입고 있고, 한 손에는 작은 폼롤러를 안고 있습니다. 누군가의 거대한 손가락이 여성의 볼을 살짝 찌르고 있고, 여성은 장난스럽게 윙크하며 웃는 표정을 짓고 있습니다. 배경은 부드러운 햇살이 들어오는 밝은 필라테스 스튜디오, 아웃포커싱 처리, 8k 해상도, 고화질 렌더링.\"" },
            { id: 67, title: "손바닥 위 투덜이 미니어처", category: "인물/프로필", imageUrl: "images/67.jpg", content: "\"A hyper-realistic miniature tiny woman with a large head (bobblehead style) sitting in the palm of a human hand. She is wearing a black tweed jacket with pearl buttons. A human finger is poking her cheek, and she has a grumpy, pouting facial expression. Blurred office background with people and laptops, high detail, 8k, cinematic lighting.\"\n핵심 키워드:\nMiniature tiny woman: 아주 작은 여인\nLarge head / Bobblehead style: 대두 스타일 (귀여움 강조)\nSitting in the palm: 손바닥 위에 앉아 있음\nPoking her cheek: 볼을 찌르는 동작\nGrumpy, pouting expression: 투덜거리는, 입을 삐죽거리는 표정" },
            { id: 68, title: "감정 표현 스티커 시트", category: "애니메이션", imageUrl: "images/68.jpg", content: "이모티콘/스티커 스타일 (2번째 이미지) 프롬프트\n캐릭터의 다양한 표정을 모아놓은 스티커 시트 형태입니다.\n영어 프롬프트:\n\"A sticker pack sheet featuring a cute Korean woman's face with various facial expressions. The expressions include: angry, happy, shy, blowing a kiss, surprised, and sleepy. 2D digital art style, white borders around each sticker, Korean text captions below each head. Clean white background.\"\n핵심 키워드:\nSticker pack sheet: 스티커 팩 시트\nVarious facial expressions: 다양한 표정\nWhite borders: 스티커 느낌을 주는 흰색 테두리\nKorean text captions: 한글 자막  첨부된 실사 이미지로 해줘" },
            { id: 69, title: "다이어트 투덜이 미니어처", category: "인물/프로필", imageUrl: "images/69.jpg", content: "다이어트/바디프로필 준비 컨셉 (투덜거리는 표정)\n\"사람 손바닥 위에 주저앉아 있는 아주 작은 미니어처 여성. 머리가 큰 귀여운 비율. 스포티한 운동복 차림이며, 한 손에는 닭가슴살 샐러드 볼을 들고 있습니다. 다이어트가 힘들어서 입을 삐죽거리며 투덜거리는 귀여운 표정입니다. 누군가의 손가락이 머리를 다정하게 쓰다듬고 있습니다. 배경은 흐릿한 헬스장, 따뜻하고 감성적인 조명, 8k, 초현실적인 미니어처 사진 스타일.\"" },
            { id: 70, title: "다이어트 미니어처 (복제)", category: "인물/프로필", imageUrl: "images/70.jpg", content: "다이어트/바디프로필 준비 컨셉 (투덜거리는 표정)\n\"사람 손바닥 위에 주저앉아 있는 아주 작은 미니어처 여성. 머리가 큰 귀여운 비율. 스포티한 운동복 차림이며, 한 손에는 닭가슴살 샐러드 볼을 들고 있습니다. 다이어트가 힘들어서 입을 삐죽거리며 투덜거리는 귀여운 표정입니다. 누군가의 손가락이 머리를 다정하게 쓰다듬고 있습니다. 배경은 흐릿한 헬스장, 따뜻하고 감성적인 조명, 8k, 초현실적인 미니어처 사진 스타일.\"" },
            { id: 71, title: "당당한 비즈니스 우먼 미니어처", category: "인물/프로필", imageUrl: "images/71.jpg", content: "세미나/비즈니스 우먼 컨셉 (당당한 표정)\n\"사람 손바닥 위에 서서 당당하게 발표하는 포즈를 취한 미니어처 비즈니스 우먼. 머리가 큰 대두 스타일. 세련된 정장 재킷을 입고 한 손에는 아주 작은 마이크(또는 태블릿)를 들고 있습니다. 자신감 넘치고 환하게 웃는 표정입니다. 배경은 흐릿하게 처리된 세미나장과 청중들, 조명은 캐릭터에 집중된 시네마틱 라이팅, 고화질 3D 렌더링.\"" },
            { id: 72, title: "성수동 카페 인플루언서", category: "인물/프로필", imageUrl: "images/72.jpg", content: "Close-up portrait of a beautiful 20-year-old Korean female influencer in a Seongsu-dong cafe, red brick wall background, natural soft sunlight through a window, wearing a white linen shirt, holding a glass of iced latte with realistic condensation droplets, shot on Sony A7R IV, 85mm lens, f/1.2, hyper-realistic skin texture, visible pores and fine peach fuzz, individual hair strands with rim lighting, subsurface scattering, 8k, RAW photo, masterwork." },
            { id: 73, title: "갤럭시 S26 울트라 셀카", category: "인물/프로필", imageUrl: "images/73.jpg", content: "업로드한 사진속에 등장하는 특정한 사람을 무릎 높이까지 클로즈업한 초고해상도 8k 극사실적 전신 사진. 그녀(그)는 confident한 미소를 지으며 한 손에는 최신 삼성 갤럭시 S26 울트라를 들고 (무광 블랙 티타늄 바디, 후면에 5개의 정교한 카메라 렌즈 클러스터가 특징) 셀카를 찍는 포즈.  다른 한 손은 블랙 수트 바지 주머니에 깊숙이 넣어 자연스럽게 포즈를 취합니다.\n\n프로필 사진 스타일 패션 에디토리얼 허리 위 상반신 초상, 정면 waist-up 샷 (허리선부터 머리까지), 전문 모델, Prada inspired tailored black suit, sharp lapels, minimalist luxury, Prada 스타일 올 블랙 테일러드 수트 재킷 + 블랙 셔츠 (또는 블랙 터틀넥 셔츠), 구조적인 sharp lapels와 깔끔한 미니멀 테일러링, 재킷 라펠에 황금색 'AI' 모노그램 핀 (골드 메탈, 약 5cm 크기, 럭셔리 엘레강트 디자인) 착용, Hasselblad X2D 100C + XCD 90mm f/2.5 렌즈로 촬영, 시네마틱 세피아 컬러 그레이딩 + 골든아워 따뜻함, 번트 엄버에서 허니 앰버로 부드러운 그라데이션 배경에 드라마틱한 검은 실루엣 강조, 아방가르드 구성, 카메라를 강렬하고 깊게 직시하는 profound intense gaze, 우아하게 길게 뻗은 neck & shoulders, 60도 각도 메인 프레넬 조명 + 실크 디퓨전으로 얼굴과 상체를 부드럽게 감싸는 빛, 75도 각도 CTO 젤 림 라이트로 윤곽과 collarbone sharp lapels gold AI pin 강조, 헤이즈 머신으로 에테리얼 몽환적 분위기, feathered soft shadows, 강한 대비 커브 조정, selective dodge and burn on face eyes neck shoulders lapels gold pin shirt collar, 미세 grain texture overlay, 5500K→3200K 컬러 온도 그라데이션, ultra sharp hyper-realistic details especially eyes skin hair collarbone jacket texture gold AI pin black shirt, RAW format, Paolo Roversi 조명 기법 영감 — 꿈같은 부드러운 빛 페인팅과 깊은 감성, 16K rich detail, professional profile picture composition centered with direct eye contact waist-up framed tightly on upper body --ar 9:16 --ar 2:3 --quality 2 --style raw --stylize 400 --v 6.1" },
            { id: 74, title: "별이 빛나는 AI GCOOP 밤", category: "배경/풍경", imageUrl: "images/74.jpg", content: "밤하늘의 넓은 별들 아래 탁 트인 들판에 서 있는 업로드한 사진속의 사람의 전신.  영화처럼 사실적인 이미지. 업로드한 사진속 인물은 시원한 밤바람에 머리카락이 살짝 흔들리는 가운데 평화로운 표정으로 별들을 올려다보고 있다. 그는 심플한 {argument name=\"clothing item\" default=\"핑크색 후드티\"}, 헐렁한 청바지 , 캐주얼 신발을 착용하고 있다.\n\n배경에는 밝은 별들. 별들 사이로 유난히 반짝이는 별이 'AI GCOOP' 글씨 형태로 유난히 빛나고  은은한 별들이 가득 찬 맑은 하늘과 희미하게 보이는 은하수가 펼쳐져 있다. 멀리 있는 언덕들은 밤하늘 아래 부드러운 실루엣으로 나타난다. 부드러운 달빛이 업로드한 인물의 얼굴과 어깨를 은은하게 비추며 자연스러운 그림자를 드리운다. 자연 속 평화로운 밤처럼 고요하고 조용한 분위기이다.\n\n사진처럼 사실적인 조명, 야간 촬영 스타일, 매우 섬세함, 사실적인 피부 톤, 얕은 피사계 심도, 영화 같은 색조, 35mm 렌즈, 8k 해상도." },
            { id: 75, title: "글래스 스킨 인플루언서", category: "광고/홍보", imageUrl: "images/75.jpg", content: "\"A high-end, photorealistic 9:16 portrait of a stunningly beautiful Korean female influencer in her late 20s. She is holding a single sachet of 'Delixir Brown Enzyme' close to her cheek, smiling confidently and refreshingly at the camera. She has perfect 'glass skin' and a trendy hairstyle. The background is a minimalist, high-ceiling luxury cafe with soft sunlight streaming through large windows, creating a warm and airy atmosphere. Shot on 85mm lens, f/1.8 for a creamy blurred background (bokeh). 8k resolution, cinematic lighting, ultra-detailed skin textures.\"" },
            { id: 76, title: "헬스장 인플루언서 리뷰", category: "광고/홍보", imageUrl: "images/76.jpg", content: "운동하는 사람들이 있는 헬스장의 사실적인 분위기.  생동감을 주기위해 주변 환경은 헬스장을 배경으로 한다.\n 업로드한 사진속 사람이  전문 인플루언서처럼 포즈를 취하고 있다,\n사진속 사람의 얼굴은 헬스장에 있다. 사실적배경. 얼굴. 캐쥬얼한 운동복을 입고 있는 사진으로 자연스럽게 바꿔줘.  안경쓰고\n 업로드한 사진속 제품을 한손에 들고 있고 한손에는 검은색 DJI Osmo 무선 마이크 송신기를 입 가까이에 대고 들고 있는 제품을 설명하는 포즈를 취하고 있다. 옷은 브라탑등이 아닌 40대들이 입을만한 후드집업등 세련되고 고급진 운동복 구성. 제품의 색과 어울리는 아주 세련되고 고급스런 스타일의 운동복 위.아래 동일 색감.제품의 비례.  질감.광택 완벽 유지, 정교한 피부.머리카락. 전체적인 디테일 묘사, 소니 A7R V, 85mm f/1.2 렌즈, 럭셔리한 미학, 8k --ar 9:16" },
            { id: 77, title: "서재 속의 평온한 노부인", category: "인물/프로필", imageUrl: "images/77.jpg", content: "[Prompt] A vertical portrait shot in 9:16 aspect ratio of a serene 74-year-old Korean woman with a gentle face. She is sitting in a cozy library, holding a small black DJI Osmo wireless microphone. She is wearing a tight-fitting, modern silk Hanbok in soft peach tones. Bookshelves and a warm fireplace in the background. 4K photo, realistic skin texture." },
            { id: 78, title: "루프탑 기상캐스터", category: "인물/프로필", imageUrl: "images/78.jpg", content: "[Prompt] A vertical portrait shot in 9:16 aspect ratio of a beautiful Korean weather caster standing on a rooftop with a city view. She is holding a clear umbrella, looking at the camera gracefully. She is wearing a tight-fitting beige trench-style dress with a belt that highlights her slim waist and curvaceous hips. Her long hair is styled in natural, soft waves. Bright, overcast daylight, soft focus city skyline background. 4K, hyper-realistic, high detail" },
            { id: 79, title: "건강한 습관 알티지 카드", category: "광고/홍보", imageUrl: "images/79.jpg", content: "결과/CTA] 당신의 책상 위 필수템\n업로드 된 이미지속 인물이 식탁에 앉아 업로드한 제품을 한손에 들고 다른 한손으로는 제품을 먹으려고하는 포즈, 배경은 거실배경,\n추천 카피:\n(상단) \"제너럴 밸런스 알티지 플러스\"\n(하단) \"오늘부터 하루 두 알, 건강한 습관을 시작하세요.\"\n\n9:16 사이즈 카드뉴스, 지금업로드한 사진만 이용해서 생성" },
            { id: 80, title: "손가락 위 크리스마스 아기 고양이", category: "애니메이션", imageUrl: "images/80.jpg", content: "{ \"prompt\": { \"scene\": \"A tiny, funny white kitten, no bigger than a fingernail, with big expressive eyes sits on the tip of a human finger in the middle of a snowy winter forest. The finger is completely covered by a beautiful closed winter knitted red glove, with all fingers fully inside the glove, no bare skin visible. The glove looks thick, cozy and well-fitted, with a clear knitted pattern and a soft layer of fresh snow on top. The kitten wears a fluffy red Christmas hat with white fur trim and a pompom.\", \"style\": \"cinematic, ultra photorealistic, highly detailed, shallow depth of field, soft bokeh background, rich dynamic range, movie-like color grading, Christmas holiday vibe\", \"motion\": \"The tiny white kitten, no bigger than a fingernail, smoothly rises up onto its hind legs on the red glove and starts gently waving one front paw toward the viewer in a looping motion. Its expression is extremely cute and friendly, with small head tilts and soft blinks. Gentle continuous snowfall fills the scene, small snowflakes drifting slowly from top to bottom. The hand in the red knitted glove stays mostly still with a very subtle natural breathing motion, camera locked in a close-up shot with the snowy forest softly blurred in the background.\", \"atmosphere\": \"Cozy, magical, heartwarming winter mood with crisp cold ambient light and a soft warm glow on the kitten and red glove, cinematic feel.\", \"negative_prompt\": \"no deformed hands, no extra fingers, no bare skin, no missing fingers, no distortion, no text, no logo, no watermark, no motion blur on the kitten, no horror elements\" }}" },
            { id: 81, title: "판도라 영화 촬영장 비하인드", category: "인물/프로필", imageUrl: "images/81.jpg", content: "아래 프롬프트는 **어떤 영화 촬영지든 공통으로** 붙여 쓰는 기본틀이야.\n\n> (인물 레퍼런스) 업로드한 내 사진을 얼굴/인물 기준으로 사용. 내 얼굴 특징(안경, 헤어스타일, 피부톤)을 유지하고 과도한 미화 없이 자연스러운 실제 사진 느낌.\n> \n> \n> **세로 9:16**, 초현실적(포토리얼) 영화 촬영장 **비하인드(BTS) 셀카**. 내가 **셀카봉 또는 한 손으로 카메라를 들고** 팔을 뻗어 촬영한 구도. **24mm 광각 전면 카메라 느낌**, 약한 렌즈 왜곡(자연스러운 수준), 얼굴은 선명.\n> \n> 촬영 중인 세트장 분위기: **그린/블루 스크립 일부**, 시네마 카메라(돌리/삼각대), 돌리 레일, 크레인(지브), 붐 마이크, C-스탠드, 소프트박스/LED 조명, 플래그, 케이블, 샌드백, 모니터(비디오 빌리지), 클래퍼보드, 헤드셋 낀 감독과 스태프가 배경에서 작업 중(배경은 얕은 심도로 살짝 흐림).\n> \n> **내가 프레임 전경에서 크게(프레임 높이 55~65%)**, 주인공들은 내 양옆/뒤쪽에 자연스럽게 붙어서 함께 카메라를 바라보며 미소. **텍스트/로고/워터마크/UI 없음.**\n> \n### 네거티브 프롬프트(옵션)\n\n> 글자, 로고, 워터마크, 자막, 앱 UI, 얼굴 뭉개짐, 손가락 과다, 사지 왜곡, 인물 중복, 플라스틱 피부, 과장된 포스터 포즈, 읽을 수 있는 간판/상표\n> \n---\n#배경은 판도라 정글 세트(바이오루미네선스 식물, 푸른 톤, 거대한 뿌리와 이끼) + 그린/블루스크린 일부. 내 양옆/뒤쪽에 파란 피부의 외계 종족 남녀 주인공 2명이 자연스럽게 붙어 셀카. 촬영장 장비(크레인/붐마이크/LED/모니터/클래퍼보드)와 감독/스태프가 배경에서 작업 중." },
            { id: 82, title: "광화문 길거리 데일리 셀카", category: "인물/프로필", imageUrl: "images/82.jpg", content: "[검은색 포니테일]을 한 [이목구비가 뚜렷하고 이쁜 20대 한국인 여성]의 자연스러운 셀카 증명사진 느낌.\n[검은색 터틀넥 니트]를 입고 [자연스럽고 즐거운 미소]를 짓고 있다. 배경은 [서울 광화문 길거리]이며, 햇빛이 쨍쨍한 [밝은 자연광]이 얼굴을 비춘다. 뒤쪽에는 [사람들이 자연스럽게 걸어다니는] 배경이며, 전체적으로 진짜 실제 사람 같은 [꾸밈없는 편안한 데일리 일상] 느낌과 분위기다. 사이즈는 9:16이다." },
            { id: 83, title: "손가락 위 아기 고양이 (Prompt)", category: "애니메이션", imageUrl: "images/83.jpg", content: "Key Theme: Two tiny, adorable kittens cutely exploring and wiggling on a human finger.\nTarget Audience: Cat lovers, people seeking healing and cute content.\nMood: Warm, cozy, lovable, healing, \"heart-melting.\"\nCamera Angle: Extreme close-up, low angle from kitten's perspective, bird's-eye view.\nCamera Lens: Macro lens, shallow depth of field.\nLighting: Soft natural light, warm diffusion, golden hour tone.\nMotion: Slow motion for kitten movements, subtle pan/tilt tracking.\nArtistic Style: Photorealistic with a warm, cute aesthetic (cutecore/kawaii).\nRendering Quality: 4K resolution, soft textures for fur and skin.\nColor Palette: Warm pastel tones (cream, light beige, pale pink, light blue), slightly desaturated.\nCharacter Description:\nKittens: Two small, fluffy, adorable kittens (e.g., a ginger tabby and a calico).\nExpressions/Poses: Curious expressions, playful poses (nibbling finger, tapping with paw), sleepy wiggling, yawning.\nMain Subject: The kittens are the main focus, with the human finger as their \"stage.\"\nHuman Hand: Clean, well-groomed finger (natural or soft pastel nail polish), warm skin tone with subtle wrinkles.\nLocation: Cozy indoor setting (bed, sunlit window, soft blanket).\nTime: Late afternoon, golden hour.\nWeather: Clear and sunny.\nMusic Genre/Tempo: Muted Lofi, ambient, acoustic guitar/piano. Slow and soft tempo.\nSound Effects: Soft kitten meows, purring, tiny paw steps (ASMR style), soft fur/fabric rustles, subtle white noise.\nNegative Prompts: grim, dark, sad, dirty, messy, aggressive, blurry, low resolution, bad anatomy, deformed, mutated, noisy, distracting background, harsh lighting, oversaturated, unnatural colors, sharp edges, uncute.\nWeights: (cute cats:1.5), (tiny kittens:1.4), (human finger:1.3), (crawling on finger:1.6), (macro shot:1.2), (shallow depth of field:1.2), (soft lighting:1.1), (warm pastel colors:1.1), (photorealistic:1.0), (healing atmosphere:1.0)" },
            { id: 84, title: "물광 피부 뷰티 모델", category: "광고/홍보", imageUrl: "images/84.jpg", content: "뷰티 모델, 한국여성 20대, 호감형 외모, 잔잔하게 미소 짓는 표정, 실내 스튜디오, 스튜디오 조명, 노메이크업 느낌의 깨끗한 피부, 13호톤의 밝은 피부, 물광 피부 표현, 한쪽 볼에 살짝 한 손으로 크림색 화장품을 바르는 자연스레  포즈, 다른 한손으로는 사진속 제품을 들고있다. 왼쪽 측면 30도 앵글 / 이미지로생성해줘" },
            { id: 85, title: "지쿱AI대학교 로고", category: "제품 로고 이미지", imageUrl: "images/4-1.jpg", content: "" },
            { id: 86, title: "CK밸런스파워", category: "제품 로고 이미지", imageUrl: "images/13-1.jpg", content: "" },
            { id: 87, title: "디엘릭서 퍼플", category: "제품 로고 이미지", imageUrl: "images/14-1.jpg", content: "" },
            { id: 88, title: "텔로메라 크림", category: "제품 로고 이미지", imageUrl: "images/15-1.jpg", content: "" },
            { id: 89, title: "디엘릭서 퍼플상자포함", category: "제품 로고 이미지", imageUrl: "images/18-1.jpg", content: "" },
            { id: 90, title: "AR 쇼핑 UI 시리즈", category: "광고/홍보", imageUrl: "images/85.jpg", content: "디저트 (AR 쇼핑 UI)\n\n현대적인 슈퍼마켓 통로 안의 1인칭 시점. 크림과 베리가 얹힌 작은 고급 디저트를 들고 있는 손. 칼로리, 설탕, 지방, 신선도 점수, 유통기한, 레시피 제안을 보여주는 미래 지향적인 증강 현실 (AR) 인터페이스 오버레이. 부드러운 심도, 시네마틱 조명, 극사실적인, 4K, 기술에서 영감을 받은 UI, 깔끔한 글래스모피즘 디자인.\n\n2. 사과 (AR 영양 UI)\n식료품점에서 신선한 빨간 사과를 들고 있는 1인칭 시점. 칼로리, 비타민 C, 섬유질, 신선도 바, 레시피 아이디어를 표시하는 증강 현실 인터페이스. 물체 주위에 떠다니는 미니멀한 미래 지향적 UI 패널. 밝은 슈퍼마켓 조명, 얕은 심도, 하이퍼리얼리스틱, 현대적인 기술 미학, 4K.\n\n3. 오렌지 소다병 (AR 데이터 UI)\n슈퍼마켓 통로에서 오렌지 소다병을 들고 있는 손의 1인칭 시점. 칼로리, 설탕 함량, 카페인 수치, 신선도 점수, 유통기한, 음료 레시피를 보여주는 미래 지향적인 AR 오버레이. 매끄러운 홀로그램 인터페이스, 글래스모피즘 UI, 생생한 색상, 시네마틱 조명, 초고화질, 포토리얼리스틱, 4K." }
        ];

        const CATEGORIES = ["전체", "인물/프로필", "애니메이션", "광고/홍보", "배경/풍경", "제품 로고 이미지"];

        // 아이콘 컴포넌트
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        elements: [i],
                        attrs: { width: size, height: size, class: className, strokeWidth: 2.5 }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex"></span>;
        };

        const App = () => {
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedItem, setSelectedItem] = useState(null);
            const [toast, setToast] = useState(null);

            // 뒤로가기 제어 (모바일 대응)
            useEffect(() => {
                const handlePopState = () => { if (selectedItem) setSelectedItem(null); };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [selectedItem]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2000);
            };

            const copyToClipboard = (text) => {
                if (!text) return;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("프롬프트가 복사되었습니다.");
            };

            const shareContent = async (item) => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: item.title,
                            text: item.content ? `[${item.title}]\n${item.content}` : `[${item.title}]`,
                            // 사이트 주소 제외 로직: url 속성을 전달하지 않음
                        });
                    } catch (e) {
                        // 사용자가 공유를 취소하거나 실패했을 때 무시
                    }
                } else {
                    showToast("공유 기능을 지원하지 않는 브라우저입니다.");
                }
            };

            const downloadImage = (url, title) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("이미지 다운로드를 시작합니다.");
            };

            const filteredData = useMemo(() => {
                return PROMPT_LIST.filter(item => {
                    const matchCat = selectedCategory === "전체" || item.category === selectedCategory;
                    const matchSearch = (item.title + (item.content || "")).toLowerCase().includes(searchQuery.toLowerCase());
                    return matchCat && matchSearch;
                });
            }, [selectedCategory, searchQuery]);

            return (
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto bg-white shadow-xl relative overflow-x-hidden">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md px-4 py-5 border-b border-slate-100 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <Icon name="sparkles" size={18} />
                            </div>
                            <div>
                                <h1 className="font-black text-sm sm:text-base tracking-tighter leading-tight text-slate-900 uppercase">
                                    AI네트워크마케팅연구소 <span className="text-indigo-600">프롬프트 BOOK</span>
                                </h1>
                            </div>
                        </div>
                    </header>

                    {/* Search & Tabs */}
                    <div className="p-3 space-y-3 border-b border-slate-50">
                        <div className="relative">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">
                                <Icon name="search" size={14} />
                            </div>
                            <input 
                                type="text" placeholder="검색어를 입력하세요..." 
                                className="w-full bg-slate-50 border-none rounded-xl pl-10 pr-4 py-3 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all"
                                value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                            />
                        </div>
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat} onClick={() => setSelectedCategory(cat)}
                                    className={`flex-shrink-0 px-4 py-2 rounded-full text-[9px] font-black border transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Grid (모바일 3열 고정) */}
                    <main className="flex-1 p-2 grid grid-cols-3 md:grid-cols-4 gap-2.5">
                        {filteredData.map(item => (
                            <div key={item.id} className="prompt-card bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm flex flex-col relative animate-in fade-in slide-in-from-bottom-2 duration-500">
                                <div className="aspect-square bg-slate-50 relative overflow-hidden cursor-pointer" onClick={() => { setSelectedItem(item); window.history.pushState({view:'detail'}, ''); }}>
                                    <img src={item.imageUrl} className="w-full h-full object-cover image-fade" loading="lazy" alt={item.title} />
                                    <div className="absolute top-1 left-1 bg-black/40 backdrop-blur-md text-white text-[5px] font-black px-1 py-0.5 rounded uppercase pointer-events-none">
                                        {item.category}
                                    </div>
                                </div>
                                <div className="p-1.5 flex flex-col gap-1.5">
                                    <h3 className="font-black text-slate-800 text-[8px] sm:text-[10px] line-clamp-1">{item.title}</h3>
                                    <div className="flex gap-1">
                                        {item.content ? (
                                            <button onClick={() => copyToClipboard(item.content)} className="action-btn flex-1 py-1.5 bg-slate-50 rounded-lg text-indigo-600 active:bg-indigo-50"><Icon name="copy" size={10} /></button>
                                        ) : (
                                            <button onClick={() => downloadImage(item.imageUrl, item.title)} className="action-btn flex-1 py-1.5 bg-slate-50 rounded-lg text-indigo-600 active:bg-indigo-50"><Icon name="download" size={10} /></button>
                                        )}
                                        <button onClick={() => shareContent(item)} className="action-btn flex-1 py-1.5 bg-slate-50 rounded-lg text-slate-400 active:bg-indigo-50"><Icon name="share-2" size={10} /></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Detail Modal */}
                    {selectedItem && (
                        <div className="fixed inset-0 z-50 bg-white flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-300 overflow-y-auto no-scrollbar">
                            <div className="sticky top-0 p-4 flex justify-between items-center bg-white/90 backdrop-blur-md z-10 border-b border-slate-50">
                                <button onClick={() => window.history.back()} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
                                    <Icon name="chevron-left" size={20} />
                                </button>
                                <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">{selectedItem.category}</span>
                                <button onClick={() => shareContent(selectedItem)} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-indigo-600">
                                    <Icon name="share-2" size={18} />
                                </button>
                            </div>
                            
                            <div className="p-5 flex flex-col gap-6 safe-bottom">
                                <div className="relative">
                                    <img src={selectedItem.imageUrl} className="w-full rounded-[40px] shadow-2xl object-cover aspect-[4/5] border-4 border-white" alt={selectedItem.title} />
                                    <button 
                                        onClick={() => downloadImage(selectedItem.imageUrl, selectedItem.title)}
                                        className="absolute bottom-4 right-4 bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-xl text-indigo-600 active:scale-90 transition-transform"
                                    >
                                        <Icon name="download" size={20} />
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    <h2 className="text-2xl font-black text-slate-900 leading-tight px-1">{selectedItem.title}</h2>
                                    {selectedItem.content && (
                                        <div className="bg-slate-50 border border-slate-100 rounded-[32px] p-6 relative group">
                                            <div className="text-slate-600 text-[15px] leading-relaxed whitespace-pre-wrap font-medium pr-10">
                                                {selectedItem.content}
                                            </div>
                                            <button 
                                                onClick={() => copyToClipboard(selectedItem.content)}
                                                className="absolute top-6 right-6 text-indigo-600 active:scale-90 transition-transform bg-white/50 p-2 rounded-xl shadow-sm"
                                            >
                                                <Icon name="copy" size={20} />
                                            </button>
                                        </div>
                                    )}
                                    <p className="text-center text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] py-4">AI Network Marketing Research Institute</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Global Toast */}
                    {toast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-slate-900 text-white rounded-full shadow-2xl flex items-center gap-2 animate-in slide-in-from-bottom-4 font-black text-[11px] border border-white/10">
                            <Icon name="check" size={14} className="text-emerald-400" />
                            {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
